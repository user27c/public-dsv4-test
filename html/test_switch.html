<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test</title>
<style>
.hidden{display:none!important}
.view{position:absolute;top:0;left:0;width:100%;height:100%}
#title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a0f0f;z-index:100}
#map-view{background:#0a1a0a}
button{font-size:22px;padding:16px 48px;background:#4a3520;color:#e8c547;border:2px solid #6b5030;cursor:pointer}
body{margin:0;background:#0d0d0d;color:#d4c5a9;font-family:Georgia,serif;overflow:hidden;height:100vh}
</style>
</head>
<body>
<div id="game" style="width:100%;height:100%;position:relative">

<div id="title-screen" class="view">
  <h1>杀戮尖塔</h1>
  <button onclick="startGame()">开始游戏</button>
</div>

<div id="map-view" class="view hidden">
  <h2>地 图</h2>
  <button onclick="startCombat()">进入战斗</button>
</div>

<div id="combat-view" class="view hidden">
  <h2>战 斗</h2>
  <p id="log"></p>
  <button onclick="endTurn()">结束回合</button>
  <button onclick="backToMap()">返回地图</button>
</div>

</div>

<script>
// Replicate the exact game architecture
const G = {
  currentView: 'title',
  inCombat: false,
  switchView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    const el = document.getElementById(view + '-view');
    if (el) el.classList.remove('hidden');
    this.currentView = view;
    document.getElementById('log').textContent = 'Switched to: ' + view;
  }
};

// The exact override from the game
const origSwitchView = G.switchView.bind(G);
G.switchView = function(view) {
  try {
    console.log('switchView override called with:', view);
    // Simplified - no top bar manipulation for test
  } catch(e) {
    console.error('switchView error:', e);
  }
  origSwitchView(view);
};

function startGame() {
  console.log('startGame called!');
  G.switchView('map');
  console.log('After switchView, currentView:', G.currentView);
}

function startCombat() {
  G.switchView('combat');
  G.inCombat = true;
}

function endTurn() {
  document.getElementById('log').textContent = 'Turn ended!';
}

function backToMap() {
  G.switchView('map');
}

console.log('Test page loaded. G.currentView:', G.currentView);
console.log('startGame function:', typeof startGame);
</script>
</body></html>
