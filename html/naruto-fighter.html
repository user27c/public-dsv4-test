<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>火影忍者手游 Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
#game-container{position:relative;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh;background:#111;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}
#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#ui-layer>*{pointer-events:auto;}

/* Select Screen */
#select-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a0a00 0%,#0a0a1a 50%,#0a001a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
#select-screen h1{color:#ff6600;font-size:clamp(20px,3.5vw,36px);margin-bottom:4px;text-shadow:0 0 20px #ff6600,0 0 40px #ff3300;letter-spacing:4px;}
#select-screen .subtitle{color:#ccc;font-size:clamp(10px,1.5vw,14px);margin-bottom:24px;}
.select-row{display:flex;gap:clamp(10px,2.5vw,30px);margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
.select-card{width:clamp(100px,16vw,160px);padding:12px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.2);border-radius:12px;cursor:pointer;text-align:center;transition:all 0.2s;}
.select-card:hover,.select-card.selected{border-color:#ff6600;background:rgba(255,102,0,0.15);box-shadow:0 0 20px rgba(255,102,0,0.3);}
.select-card .icon{width:clamp(50px,8vw,80px);height:clamp(50px,8vw,80px);margin:0 auto 8px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,3.5vw,36px);}
.select-card .name{color:#fff;font-size:clamp(11px,1.6vw,15px);font-weight:bold;}
.select-card .desc{color:#999;font-size:clamp(9px,1.2vw,11px);margin-top:2px;}
#start-btn{margin-top:20px;padding:12px 48px;font-size:clamp(16px,2.2vw,20px);background:linear-gradient(180deg,#ff8800,#cc4400);color:#fff;border:none;border-radius:25px;cursor:pointer;font-weight:bold;letter-spacing:2px;box-shadow:0 4px 15px rgba(255,102,0,0.4);transition:all 0.2s;}
#start-btn:hover{transform:scale(1.05);box-shadow:0 6px 25px rgba(255,102,0,0.6);}
#start-btn:active{transform:scale(0.95);}

/* Mobile Controls */
#mobile-controls{position:absolute;bottom:10px;left:0;width:100%;display:none;justify-content:space-between;padding:0 10px;pointer-events:none;z-index:50;}
#joystick-area{width:120px;height:120px;background:rgba(255,255,255,0.08);border-radius:50%;position:relative;pointer-events:auto;}
#joystick-thumb{width:50px;height:50px;background:rgba(255,255,255,0.25);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
#btn-group{display:grid;grid-template-columns:repeat(3,55px);grid-template-rows:repeat(3,55px);gap:6px;pointer-events:auto;}
.mbtn{width:55px;height:55px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.6);color:#fff;font-size:11px;font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer;text-align:center;line-height:1.1;transition:all 0.1s;}
.mbtn:active{background:rgba(255,255,255,0.3);transform:scale(0.9);}
.mbtn.on-cd{opacity:0.4;color:#888;border-color:#444;}
.mbtn.ultimate-btn{border-color:#ff6600;color:#ff6600;box-shadow:0 0 10px rgba(255,102,0,0.3);}

/* Desktop controls hint */
#controls-hint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:10px;z-index:51;display:block;}

/* Ougi overlay */
#ougi-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:60;pointer-events:none;}
#ougi-overlay.active{display:flex;align-items:center;justify-content:center;}

/* Result screen */
#result-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:70;}
#result-screen.active{display:flex;}
#result-screen .result-text{font-size:clamp(28px,5vw,48px);font-weight:bold;margin-bottom:12px;}
#result-screen .result-text.win{color:#ffaa00;text-shadow:0 0 30px #ff6600;}
#result-screen .result-text.lose{color:#6666ff;text-shadow:0 0 30px #3333aa;}
#result-screen .result-detail{color:#ccc;font-size:clamp(12px,1.8vw,16px);margin-bottom:20px;}
#result-screen button{padding:10px 36px;font-size:16px;background:#ff6600;color:#fff;border:none;border-radius:20px;cursor:pointer;font-weight:bold;}

@media(max-width:768px){
  #mobile-controls{display:flex;}
  #controls-hint{display:none;}
}
@media(hover:none) and (pointer:coarse){
  #mobile-controls{display:flex;}
  #controls-hint{display:none;}
}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>
  
  <div id="select-screen">
    <h1>火影忍者 激斗</h1>
    <div class="subtitle">NARUTO MOBILE FIGHTER DEMO</div>
    <div class="select-row" id="ninja-select">
      <div class="select-card selected" data-ninja="naruto">

  <div id="mobile-controls">
    <div id="joystick-area">

    <div id="btn-group">
      <button class="mbtn" data-action="skill1">技1</button>

      <button class="mbtn ultimate-btn" data-action="ultimate">奥义</button>
      <button class="mbtn" data-action="attack" style="background:rgba(255,100,0,0.4);border-color:#ff6600;">普攻</button>

    </div>
  </div>

  <div id="ougi-overlay"><canvas id="ougi-canvas"></canvas></div>
  <div id="result-screen">
    <div class="result-text" id="result-text"></div>
    <div class="result-detail" id="result-detail"></div>
    <button id="rematch-btn">再来一局</button>
  </div>
  <div id="controls-hint">WASD移动 | J普攻 K/L技能 U密卷 I通灵 O奥义 | 空格:替身 | S:防御</div>
</div>

<script>
// ============================================================
//  CONFIGURATION
// ============================================================
const CONFIG = {
  WIDTH: 960, HEIGHT: 540,
  GROUND_Y: 440,
  GRAVITY: 1800,
  ROUND_TIME: 60,
  MAX_ROUNDS: 3,
  MAX_HP: 1000,
  MAX_CHAKRA: 4,
  START_CHAKRA: 2,
  
  // Cooldowns (seconds)
  CD_SKILL1: 10, CD_SKILL2: 12,
  CD_SCROLL_LIGHTNING: 18, CD_SCROLL_EARTH: 20,
  CD_SUMMON_GAMAKICHI: 25, CD_SUMMON_KATSUYU: 30,
  CD_SUBSTITUTION: 15,
  
  // Damage
  DMG_BASIC: 28,
  DMG_SKILL1: 110,
  DMG_SKILL2: 135,
  DMG_SCROLL_LIGHTNING: 60,
  DMG_SUMMON_GAMAKICHI: 140,
  HEAL_KATSUYU: 100,
  DMG_ULTIMATE: 380,
  
  // Combo protection
  COMBO_YELLOW: 250,
  COMBO_RED: 450,
  
  // Speeds
  MOVE_SPEED: 320,
  JUMP_VEL: -750,
  DASH_SPEED: 550,
  
  // Hitstop
  HITSTOP_HEAVY: 0.15,
  HITSTOP_LIGHT: 0.05,
  
  // Substitution
  SUB_INVINCIBLE: 0.5,
  
  // Arena bounds
  LEFT_BOUND: 50,
  RIGHT_BOUND: 910,
};

// ============================================================
//  UTILITIES
// ============================================================
function clamp(v,min,max){return v<min?min:v>max?max:v;}
function lerp(a,b,t){return a+(b-a)*t;}
function randRange(min,max){return min+Math.random()*(max-min);}
function randInt(min,max){return Math.floor(randRange(min,max+1));}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function rectOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ============================================================
//  PARTICLE SYSTEM
// ============================================================
class Particle {
  constructor(x,y,vx,vy,life,color,size=4){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.life=life;this.maxLife=life;this.color=color;this.size=size;
    this.alive=true;
  }
  update(dt){
    this.life-=dt;
    if(this.life<=0){this.alive=false;return;}
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    this.vy+=CONFIG.GRAVITY*0.3*dt;
    this.size*=0.998;
  }
  draw(ctx){
    const alpha=this.life/this.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=this.color;
    ctx.shadowColor=this.color;
    ctx.shadowBlur=this.size*2;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*alpha,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  }
}

class ParticleSystem {
  constructor(){this.particles=[];}
  emit(x,y,count,color,life=0.5,speed=200,size=4){
    for(let i=0;i<count;i++){
      const angle=randRange(0,Math.PI*2);
      const spd=randRange(speed*0.3,speed);
      this.particles.push(new Particle(x,y,Math.cos(angle)*spd,Math.sin(angle)*spd,randRange(life*0.5,life),color,randRange(size*0.5,size*1.5)));
    }
  }
  emitDirected(x,y,count,color,dirX,dirY,life=0.5,speed=200,size=4){
    for(let i=0;i<count;i++){
      const spread=randRange(-0.5,0.5);
      const angle=Math.atan2(dirY,dirX)+spread;
      const spd=randRange(speed*0.5,speed);
      this.particles.push(new Particle(x,y,Math.cos(angle)*spd,Math.sin(angle)*spd,randRange(life*0.5,life),color,randRange(size*0.5,size*1.5)));
    }
  }
  update(dt){
    for(let i=this.particles.length-1;i>=0;i--){
      this.particles[i].update(dt);
      if(!this.particles[i].alive) this.particles.splice(i,1);
    }
  }
  draw(ctx){
    for(const p of this.particles) p.draw(ctx);
  }
  clear(){this.particles.length=0;}
}

// ============================================================
//  PROJECTILE
// ============================================================
class Projectile {
  constructor(x,y,vx,vy,w,h,damage,owner,color,life=2,type='normal'){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.w=w;this.h=h;this.damage=damage;this.owner=owner;
    this.color=color;this.life=life;this.maxLife=life;
    this.alive=true;this.type=type;
    this.hasHit=false;
  }
  update(dt){
    this.life-=dt;
    if(this.life<=0){this.alive=false;return;}
    this.x+=this.vx*dt;
    this.y+=this.vy*dt;
    if(this.type!=='ground') this.vy+=CONFIG.GRAVITY*0.5*dt;
  }
  draw(ctx){
    const alpha=this.life/this.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=this.color;
    ctx.shadowColor=this.color;
    ctx.shadowBlur=15;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.w/2,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  }
  getRect(){return {x:this.x-this.w/2,y:this.y-this.h/2,w:this.w,h:this.h};}
}

// ============================================================
//  SUMMON ENTITY
// ============================================================
class SummonEntity {
  constructor(type,x,y,owner){
    this.type=type;this.x=x;this.y=y;this.owner=owner;
    this.life=1.2;this.maxLife=1.2;this.alive=true;
    this.phase=0;this.phaseTimer=0;
    this.damage=type==='gamakichi'?CONFIG.DMG_SUMMON_GAMAKICHI:0;
    this.heal=type==='katsuyu'?CONFIG.HEAL_KATSUYU:0;
    if(type==='gamakichi'){this.targetX=x;this.targetY=CONFIG.GROUND_Y-50;}
    if(type==='katsuyu'){this.targetX=owner<0?-120:CONFIG.WIDTH+120;this.targetY=CONFIG.GROUND_Y-80;}
  }
  update(dt,opponent,owner){
    this.life-=dt;
    if(this.life<=0){this.alive=false;return;}
    this.phaseTimer+=dt;
    if(this.type==='gamakichi'){
      if(this.phase===0&&this.phaseTimer>0.3){
        this.phase=1;this.phaseTimer=0;
        // Deal damage
	        if(Math.abs(opponent.x-this.targetX)<120&&Math.abs(opponent.y-CONFIG.GROUND_Y)<60){
	          opponent.takeDamage(this.damage,this.owner,this.targetX<opponent.x?-1:1);
	        }
      }
    }
    if(this.type==='katsuyu'){
      if(this.phase===0&&this.phaseTimer>0.3){
        this.phase=1;this.phaseTimer=0;
        if(owner) owner.hp=Math.min(owner.maxHp,owner.hp+this.heal);
      }
    }
  }
  draw(ctx){
    const alpha=Math.min(1,this.life/0.3)*Math.min(1,(this.maxLife-this.life)/0.3);
    ctx.globalAlpha=alpha;
    if(this.type==='gamakichi'){
      this._drawGamakichi(ctx);
    }else{
      this._drawKatsuyu(ctx);
    }
    ctx.globalAlpha=1;
  }
  _drawGamakichi(ctx){
    const x=this.targetX,y=CONFIG.GROUND_Y;
    ctx.fillStyle='#d4522a';
    ctx.beginPath();ctx.ellipse(x,y-45,45,35,0,Math.PI,0);ctx.fill();
    ctx.fillStyle='#e8783a';
    ctx.beginPath();ctx.ellipse(x,y-50,38,30,0,Math.PI,0);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-18,y-55,8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+18,y-55,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(x-18,y-55,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+18,y-55,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a33';ctx.lineWidth=3;ctx.beginPath();
    ctx.moveTo(x-30,y-50);ctx.quadraticCurveTo(x-25,y-42,x-20,y-45);ctx.stroke();
    ctx.moveTo(x+30,y-50);ctx.quadraticCurveTo(x+25,y-42,x+20,y-45);ctx.stroke();
  }
  _drawKatsuyu(ctx){
    const x=this.owner>0?60:CONFIG.WIDTH-60,y=CONFIG.GROUND_Y-40;
    ctx.fillStyle='#aaddff';ctx.beginPath();ctx.arc(x,y,30,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cceeff';ctx.beginPath();ctx.arc(x,y-8,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#88bbdd';ctx.beginPath();ctx.arc(x-12,y+5,10,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+12,y+5,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-16,y-5,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x-4,y-5,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(x-16,y-5,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x-4,y-5,2,0,Math.PI*2);ctx.fill();
  }
}

// ============================================================
//  FIGHTER CLASS
// ============================================================
class Fighter {
  constructor(ninjaType,scrollType,summonType,x,facing,isPlayer){
    this.ninjaType=ninjaType;
    this.scrollType=scrollType;
    this.summonType=summonType;
    this.x=x;this.y=CONFIG.GROUND_Y;
    this.vx=0;this.vy=0;
    this.facing=facing;
    this.isPlayer=isPlayer;
    
    // Stats
    this.hp=CONFIG.MAX_HP;
    this.maxHp=CONFIG.MAX_HP;
    this.displayHp=CONFIG.MAX_HP;
    this.chakra=CONFIG.START_CHAKRA;
    this.maxChakra=CONFIG.MAX_CHAKRA;
    
    // State machine
    this.state='idle';
    this.stateTimer=0;
    this.stateData={};
    this.comboCount=0;
    this.comboStage=0;
    this.comboTimer=0;
    this.comboDmg=0;
    
    // Cooldowns
    this.cdSkill1=0; this.cdSkill2=0;
    this.cdScroll=0; this.cdSummon=0;
    this.cdSub=0;
    
    // Substitution
    this.subReady=true;
    this.subCooldown=0;
    
    // Invincibility
    this.invincible=0;
    this.superArmor=0; // 金刚体
    this.hyperArmor=0; // 霸体
    
    // Guard
    this.isGuarding=false;
    this.guardHealth=200;
    
    // Combo protection
    this.protection=0;
    this.wasKnockedDown=false;
    this.knockdownInvincible=0;
    
    // Animation
    this.animFrame=0;
    this.animTimer=0;
    this.hitFlash=0;
    
    // Damaged flash
    this.damageFlash=0;
    
    // Has used ultimate this round (for post-ult state)
    this.usedUltimate=false;
  }
  
  maxCD(cdName){
    switch(cdName){
      case'skill1':return CONFIG.CD_SKILL1;
      case'skill2':return CONFIG.CD_SKILL2;
      case'scroll':return this.scrollType==='lightning'?CONFIG.CD_SCROLL_LIGHTNING:CONFIG.CD_SCROLL_EARTH;
      case'summon':return this.summonType==='gamakichi'?CONFIG.CD_SUMMON_GAMAKICHI:CONFIG.CD_SUMMON_KATSUYU;
      case'sub':return CONFIG.CD_SUBSTITUTION;
      default:return 10;
    }
  }
  
  canAct(){return !['hit','heavyHit','knockdown','getup','ultimate','summoning','scrolling'].includes(this.state);}
  canBeHit(){return this.invincible<=0&&this.superArmor<=0&&this.knockdownInvincible<=0&&this.state!=='substitution';}
  
  faceOpponent(opp){this.facing=opp.x>this.x?1:-1;}
  
  takeDamage(amount,ownerId,dir){
    if(!this.canBeHit()) return 0;
    
    // Guard check
    if(this.isGuarding&&dir===this.facing*-1){
      const chipDmg=Math.floor(amount*0.15);
      this.guardHealth-=amount;
      this.hp=Math.max(0,this.hp-chipDmg);
      game.particles.emit(this.x,this.y-40,8,'#ffffff',0.3,120,3);
      if(this.guardHealth<=0){this.isGuarding=false;this.guardHealth=200;this.state='hit';this.stateTimer=0.5;}
      this.damageFlash=0.1;
      return chipDmg;
    }
    
    if(this.hyperArmor>0&&!this.stateData.grabHit){
      game.particles.emit(this.x,this.y-40,5,'#ffff00',0.3,100,3);
      return 0;
    }
    
    // Protection scaling
    let dmgMultiplier=1;
    if(this.protection>=CONFIG.COMBO_RED) dmgMultiplier=0.3;
    else if(this.protection>=CONFIG.COMBO_YELLOW) dmgMultiplier=0.65;
    const actualDmg=Math.floor(amount*dmgMultiplier);
    
    this.hp=Math.max(0,this.hp-actualDmg);
    this.protection+=actualDmg;
    this.damageFlash=0.08;
    
    // Determine hit reaction
    if(this.protection>=CONFIG.COMBO_RED||amount>=200){
      this.state='knockdown';this.stateTimer=0.5;
      this.knockdownInvincible=1.0;
      this.protection=0;
      this.wasKnockedDown=true;
    }else{
      this.state='hit';this.stateTimer=0.35;
    }
    
    this.vx=dir*200;
    this.vy=-150;
    this.isGuarding=false;
    
    // Chakra gain for attacker
    return actualDmg;
  }
  
  addChakra(amount){
    this.chakra=Math.min(this.maxChakra,this.chakra+amount);
  }
  
  // ============ SKILL ACTIONS ============
  startBasicAttack(opponent){
    if(!this.canAct()) return;
    this.state='basicAttack';
    this.stateTimer=0.25;
    this.stateData={stage:this.comboStage%4+1};
    this.animFrame=0;
    this.faceOpponent(opponent);
    this.comboTimer=1.2;
    this.comboStage=this.stateData.stage;
  }
  
  startSkill1(opponent){
    if(!this.canAct()||this.cdSkill1>0) return;
    this.state='skill1';this.stateTimer=0.6;
    this.cdSkill1=this.maxCD('skill1');
    this.hyperArmor=0.4;
    this.faceOpponent(opponent);
    this.stateData={hitDealt:false,projectiles:[],phase:0};
  }
  
  startSkill2(opponent){
    if(!this.canAct()||this.cdSkill2>0) return;
    this.state='skill2';this.stateTimer=0.65;
    this.cdSkill2=this.maxCD('skill2');
    this.faceOpponent(opponent);
    this.stateData={hitDealt:false,projectiles:[],phase:0};
  }
  
  startScroll(opponent){
    if(!this.canAct()||this.cdScroll>0||this.scrollType==='none') return;
    this.state='scrolling';this.stateTimer=0.4;
    this.cdScroll=this.maxCD('scroll');
    this.superArmor=0.4;
    this.faceOpponent(opponent);
    this.stateData={executed:false};
  }
  
  startSummon(opponent,ownerId){
    if(!this.canAct()||this.cdSummon>0||this.summonType==='none') return;
    this.state='summoning';this.stateTimer=0.5;
    this.cdSummon=this.maxCD('summon');
    this.superArmor=0.5;
    this.faceOpponent(opponent);
    const sx=this.summonType==='gamakichi'?opponent.x:this.x;
    game.summons.push(new SummonEntity(this.summonType,sx,CONFIG.GROUND_Y,ownerId));
    game.particles.emit(this.x,this.y-30,12,'#ffffff',0.5,250,5);
  }
  
  startUltimate(opponent,ownerId){
    if(!this.canAct()||this.chakra<4||this.usedUltimate) return;
    this.state='ultimate';this.stateTimer=2.5;
    this.chakra=0;
    this.superArmor=2.5;
    this.usedUltimate=true;
    this.faceOpponent(opponent);
    this.stateData={hitDealt:false,phase:0,target:opponent,ownerId:ownerId};
    game.battle.onUltimateStart(ownerId);
  }
  
  useSubstitution(opponent){
    if(!this.subReady||this.subCooldown>0||this.chakra<1) return;
    if(!['hit','heavyHit','knockdown'].includes(this.state)) return;
    this.state='substitution';this.stateTimer=0.3;
    this.subCooldown=CONFIG.CD_SUBSTITUTION;
    this.subReady=false;
    this.chakra--;
    this.invincible=CONFIG.SUB_INVINCIBLE;
    this.x=opponent.x+opponent.facing*-80;
    this.x=clamp(this.x,CONFIG.LEFT_BOUND,CONFIG.RIGHT_BOUND);
    this.y=CONFIG.GROUND_Y;
    this.vx=0;this.vy=0;
    this.protection=0;
    game.particles.emit(opponent.x,opponent.y-40,15,'#cccccc',0.4,150,5);
  }
  
  update(dt,opponent,ownerId){
    // Timers
    this.stateTimer-=dt;
    this.invincible=Math.max(0,this.invincible-dt);
    this.superArmor=Math.max(0,this.superArmor-dt);
    this.hyperArmor=Math.max(0,this.hyperArmor-dt);
    this.knockdownInvincible=Math.max(0,this.knockdownInvincible-dt);
    this.hitFlash=Math.max(0,this.hitFlash-dt);
    this.damageFlash=Math.max(0,this.damageFlash-dt);
    this.comboTimer=Math.max(0,this.comboTimer-dt);
    
    // Cooldowns (substitution managed separately)
    for(const cd of['skill1','skill2','scroll','summon']){
      const key='cd'+cd.charAt(0).toUpperCase()+cd.slice(1);
      this[key]=Math.max(0,this[key]-dt);
    }
    this.subCooldown=Math.max(0,this.subCooldown-dt);
    if(this.subCooldown<=0&&!this.subReady) this.subReady=true;
    
    // Display HP lerp
    this.displayHp=lerp(this.displayHp,this.hp,Math.min(1,dt*12));
    
    // Physics
    this.vy+=CONFIG.GRAVITY*dt;
    this.x+=this.vx*dt;
    this.y+=this.vy*dt;
    
    // Ground clamp
    if(this.y>=CONFIG.GROUND_Y){
      this.y=CONFIG.GROUND_Y;
      this.vy=Math.min(0,this.vy);
      this.vx*=0.85;
    }
    
    // Boundaries
    this.x=clamp(this.x,CONFIG.LEFT_BOUND,CONFIG.RIGHT_BOUND);
    
    // State machine
    this._updateState(dt,opponent,ownerId);
    
    // Reset combo if timer expired
    if(this.comboTimer<=0){this.comboStage=0;this.comboDmg=0;}
    
    // Guard
    if(this.isGuarding&&!['guard'].includes(this.state)&&this.state!=='idle'&&this.state!=='walk'){
      this.isGuarding=false;
    }
  }
  
  _updateState(dt,opponent,ownerId){
    if(this.state==='idle'||this.state==='walk'){
      if(this.stateTimer<=0) this.state='idle';
      if(this.vx===0&&this.state==='walk') this.state='idle';
    }
    
    if(this.state==='basicAttack'){
      if(this.stateTimer<=0){
        if(this.comboStage>=4&&this.comboStage%4===0) this.state='idle';
        else this.state='idle';
        this.comboStage=this.comboStage>=4?0:this.comboStage;
      }
      // Hit detection mid-attack
      if(this.stateData.stage&&this.stateTimer<0.3&&this.stateTimer>0.05){
        const hitRange=this.facing>0?
          {x:this.x+10,y:this.y-70,w:60,h:70}:
          {x:this.x-70,y:this.y-70,w:60,h:70};
        const oppRect={x:opponent.x-20,y:opponent.y-90,w:40,h:90};
        if(rectOverlap(hitRange,oppRect)&&!this.stateData.hitDealt){
          this.stateData.hitDealt=true;
          const dmg=CONFIG.DMG_BASIC*(0.7+this.comboStage*0.1);
          const dealt=opponent.takeDamage(Math.floor(dmg),ownerId,this.facing);
          if(dealt>0){
            this.addChakra(1);
            game.particles.emit(
              this.x+this.facing*30,opponent.y-50,
              8,this.ninjaType==='naruto'?'#ffaa00':'#6666ff',0.3,150,3
            );
            game.battle.addCombo(ownerId);
          }
        }
      }
    }
    
    if(this.state==='skill1'){
      if(this.stateData.phase===0&&this.stateTimer<0.3){
        this.stateData.phase=1;
        this._executeSkill1(opponent,ownerId);
      }
      if(this.stateTimer<=0) this.state='idle';
    }
    
    if(this.state==='skill2'){
      if(this.stateData.phase===0&&this.stateTimer<0.3){
        this.stateData.phase=1;
        this._executeSkill2(opponent,ownerId);
      }
      if(this.stateTimer<=0) this.state='idle';
    }
    
    if(this.state==='scrolling'){
      if(!this.stateData.executed&&this.stateTimer<0.15){
        this.stateData.executed=true;
        this._executeScroll(opponent,ownerId);
      }
      if(this.stateTimer<=0) this.state='idle';
    }
    
    if(this.state==='summoning'){
      if(this.stateTimer<=0) this.state='idle';
    }
    
    if(this.state==='ultimate'){
      if(this.stateData.phase===0&&this.stateTimer<1.5){
        this.stateData.phase=1;
        this._executeUltimate(opponent,ownerId);
      }
      if(this.stateTimer<=0){this.state='idle';}
    }
    
    if(this.state==='hit'){
      if(this.stateTimer<=0) this.state='idle';
    }
    if(this.state==='knockdown'){
      if(this.stateTimer<=0){
        this.state='getup';
        this.stateTimer=0.4;
      }
    }
    if(this.state==='getup'){
      if(this.stateTimer<=0){this.state='idle';this.wasKnockedDown=false;}
    }
    if(this.state==='substitution'){
      if(this.stateTimer<=0) this.state='idle';
    }
    
    // Guard state
    if(this.isGuarding&&(this.state==='idle'||this.state==='walk')) this.state='guard';
    if(!this.isGuarding&&this.state==='guard') this.state='idle';
  }
  
  _executeSkill1(opponent,ownerId){
    if(this.ninjaType==='naruto') this._narutoSkill1(opponent,ownerId);
    else this._sasukeSkill1(opponent,ownerId);
  }
  _executeSkill2(opponent,ownerId){
    if(this.ninjaType==='naruto') this._narutoSkill2(opponent,ownerId);
    else this._sasukeSkill2(opponent,ownerId);
  }
  _executeScroll(opponent,ownerId){
    if(this.scrollType==='lightning') this._scrollLightning(opponent,ownerId);
    else this._scrollEarth(opponent,ownerId);
  }
  _executeUltimate(opponent,ownerId){
    if(this.ninjaType==='naruto') this._narutoUltimate(opponent,ownerId);
    else this._sasukeUltimate(opponent,ownerId);
  }
  
  // --- Naruto Skills ---
  _narutoSkill1(opponent,ownerId){
    // Spiraling Sphere - dash forward
    const dashDist=180;
    this.x+=this.facing*dashDist;
    this.x=clamp(this.x,CONFIG.LEFT_BOUND,CONFIG.RIGHT_BOUND);
    game.particles.emit(this.x,this.y-50,25,'#4488ff',0.4,300,8);
    game.particles.emit(this.x,this.y-50,15,'#ffffff',0.3,200,5);
    
    if(Math.abs(this.x-opponent.x)<80&&Math.abs(opponent.y-CONFIG.GROUND_Y)<60){
      const dealt=opponent.takeDamage(CONFIG.DMG_SKILL1,ownerId,this.facing);
      if(dealt>0){this.addChakra(1);opponent.vx=this.facing*350;opponent.vy=-200;
        game.particles.emit(opponent.x,opponent.y-40,20,'#88ccff',0.5,250,6);
        game.battle.addCombo(ownerId);
      }
    }
  }
  
  _narutoSkill2(opponent,ownerId){
    // Shadow Clone Barrage
    for(let i=0;i<3;i++){
      const sx=this.x+this.facing*(40+i*50);
      game.particles.emit(sx,this.y-40,6,'#ffcc00',0.4,150,4);
    }
    const hitX=this.x+this.facing*100;
    if(Math.abs(hitX-opponent.x)<90&&Math.abs(opponent.y-CONFIG.GROUND_Y)<70){
      const dealt=opponent.takeDamage(CONFIG.DMG_SKILL2,ownerId,this.facing);
      if(dealt>0){this.addChakra(1);opponent.vx=this.facing*300;opponent.vy=-250;
        game.particles.emit(opponent.x,opponent.y-40,25,'#ffaa00',0.5,280,5);
      }
    }
  }
  
  _narutoUltimate(opponent,ownerId){
    // Wind Style: Rasenshuriken
    game.particles.emit(this.x,this.y-50,40,'#66aaff',0.8,400,10);
    game.particles.emit(this.x,this.y-50,30,'#ffffff',0.6,350,8);
    game.screenShake=0.3;
    game.hitstop=CONFIG.HITSTOP_HEAVY;
    
    if(Math.abs(this.x-opponent.x)<250){
      const dealt=opponent.takeDamage(CONFIG.DMG_ULTIMATE,ownerId,this.facing);
      if(dealt>0){
        opponent.vx=this.facing*500;opponent.vy=-400;
        game.particles.emit(opponent.x,opponent.y-40,50,'#88ccff',1,500,8);
        game.screenShake=0.5;
        game.battle.checkOugiKill(ownerId);
      }
    }
  }
  
  // --- Sasuke Skills ---
  _sasukeSkill1(opponent,ownerId){
    // Chidori Sharp Spear
    const px=this.x+this.facing*80;
    game.particles.emit(px,this.y-45,20,'#aa88ff',0.5,250,6);
    game.particles.emit(px,this.y-45,10,'#ffffff',0.3,200,4);
    
    if(Math.abs(px-opponent.x)<100&&Math.abs(opponent.y-CONFIG.GROUND_Y)<70){
      const dealt=opponent.takeDamage(CONFIG.DMG_SKILL1,ownerId,this.facing);
      if(dealt>0){this.addChakra(1);opponent.vx=this.facing*350;opponent.vy=-180;
        game.particles.emit(opponent.x,opponent.y-40,25,'#ccbbff',0.5,280,5);
        game.battle.addCombo(ownerId);
      }
    }
  }
  
  _sasukeSkill2(opponent,ownerId){
    // Fire Style: Dragon Fire
    const fireX=this.x+this.facing*120;
    game.particles.emit(fireX,this.y-60,30,'#ff4400',0.6,300,8);
    game.particles.emit(fireX,this.y-60,20,'#ffaa00',0.5,250,6);
    
    if(Math.abs(fireX-opponent.x)<110&&Math.abs(opponent.y-CONFIG.GROUND_Y)<80){
      const dealt=opponent.takeDamage(CONFIG.DMG_SKILL2,ownerId,this.facing);
      if(dealt>0){this.addChakra(1);opponent.vx=this.facing*280;opponent.vy=-220;
        game.particles.emit(opponent.x,opponent.y-50,30,'#ff6600',0.6,300,7);
      }
    }
  }
  
  _sasukeUltimate(opponent,ownerId){
    // Kirin
    game.particles.emit(opponent.x,0,60,'#8844ff',1,500,10);
    game.particles.emit(opponent.x,CONFIG.GROUND_Y,40,'#ffffff',0.7,400,8);
    game.screenShake=0.4;
    game.hitstop=CONFIG.HITSTOP_HEAVY;
    
    if(Math.abs(this.x-opponent.x)<300){
      const dealt=opponent.takeDamage(CONFIG.DMG_ULTIMATE,ownerId,this.facing);
      if(dealt>0){
        opponent.vx=this.facing*450;opponent.vy=-450;
        game.particles.emit(opponent.x,opponent.y-40,60,'#aa66ff',1.2,550,10);
        game.screenShake=0.6;
        game.battle.checkOugiKill(ownerId);
      }
    }
  }
  
  // --- Scrolls ---
  _scrollLightning(opponent,ownerId){
    const lx=opponent.x,ly=opponent.y-100;
    game.particles.emit(lx,ly,25,'#ffff00',0.5,300,6);
    game.particles.emit(lx,ly,15,'#ffffff',0.3,200,4);
    
    if(Math.abs(this.x-opponent.x)<400){
      const dealt=opponent.takeDamage(CONFIG.DMG_SCROLL_LIGHTNING,ownerId,this.facing);
      if(dealt>0){
        opponent.vx=this.facing*300;opponent.vy=-250;
        game.battle.addCombo(ownerId);
      }
    }
  }
  
  _scrollEarth(opponent,ownerId){
    // Earth wall - blocks projectiles and pushes back
    const wx=this.x+this.facing*60;
    game.particles.emit(wx,CONFIG.GROUND_Y,20,'#8B4513',0.6,200,6);
    game.particles.emit(wx,CONFIG.GROUND_Y-20,10,'#654321',0.5,150,4);
    
    if(Math.abs(wx-opponent.x)<70&&Math.abs(opponent.y-CONFIG.GROUND_Y)<50){
      opponent.vx=this.facing*250;opponent.vy=-100;
    }
  }
  
  // ============ RENDER ============
  draw(ctx){
    ctx.save();
    const flip=this.facing<0;
    const cx=this.x,cy=this.y;
    
    // Damage flash
    if(this.damageFlash>0){
      ctx.globalAlpha=0.7+Math.sin(this.damageFlash*60)*0.3;
    }
    
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath();ctx.ellipse(cx,CONFIG.GROUND_Y+3,25,6,0,0,Math.PI*2);ctx.fill();
    
    // Invincibility flash
    if(this.invincible>0&&Math.floor(this.invincible*20)%2===0){
      ctx.globalAlpha=0.4;
    }
    
    ctx.translate(cx,cy);
    if(flip) ctx.scale(-1,1);
    
    if(this.ninjaType==='naruto') this._drawNaruto(ctx);
    else this._drawSasuke(ctx);
    
    ctx.restore();
    
    // Draw super armor indicator
    if(this.superArmor>0){
      ctx.strokeStyle='rgba(255,215,0,0.7)';
      ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(cx,cy-50,32,0,Math.PI*2);ctx.stroke();
    }
  }
  
  _drawNaruto(ctx){
    // Body
    ctx.fillStyle='#ff6600';
    ctx.fillRect(-18,-30,36,45);
    // Jacket
    ctx.fillStyle='#ff8800';
    ctx.fillRect(-20,-32,40,20);
    ctx.fillStyle='#2244aa';
    ctx.fillRect(-8,-25,16,20);
    // Legs
    ctx.fillStyle='#333';
    ctx.fillRect(-16,15,14,35);
    ctx.fillRect(2,15,14,35);
    // Sandals
    ctx.fillStyle='#2244aa';
    ctx.fillRect(-18,48,18,10);
    ctx.fillRect(0,48,18,10);
    // Head
    ctx.fillStyle='#ffcc88';
    ctx.beginPath();ctx.arc(0,-45,16,0,Math.PI*2);ctx.fill();
    // Hair (spiky yellow)
    ctx.fillStyle='#ffdd44';
    for(let i=0;i<7;i++){
      const a=(i/7)*Math.PI*2-Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a-0.2)*14,-45+Math.sin(a-0.2)*14);
      ctx.lineTo(Math.cos(a)*26,-45+Math.sin(a)*26);
      ctx.lineTo(Math.cos(a+0.2)*14,-45+Math.sin(a+0.2)*14);
      ctx.fill();
    }
    // Headband
    ctx.fillStyle='#3355aa';
    ctx.fillRect(-16,-50,32,8);
    ctx.fillStyle='#ccc';
    ctx.fillRect(-5,-51,10,10);
    // Face
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(-5,-47,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-47,2.5,0,Math.PI*2);ctx.fill();
    // Whiskers
    ctx.strokeStyle='#cc9966';ctx.lineWidth=1;
    for(let s=-1;s<=1;s+=2){
      ctx.beginPath();ctx.moveTo(s*10,-42);ctx.lineTo(s*18,-41);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*9,-39);ctx.lineTo(s*17,-38);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*10,-36);ctx.lineTo(s*18,-35);ctx.stroke();
    }
    // Mouth
    ctx.strokeStyle='#000';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-38,5,0.2,Math.PI-0.2);ctx.stroke();
    // Arms
    ctx.fillStyle='#ffcc88';
    ctx.fillRect(18,-25,12,22);
    ctx.fillRect(-30,-20,12,20);
    // Hands
    ctx.fillStyle='#ffcc88';
    ctx.beginPath();ctx.arc(24,-3,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-24,-2,6,0,Math.PI*2);ctx.fill();
  }
  
  _drawSasuke(ctx){
    // Body
    ctx.fillStyle='#2a2a4a';
    ctx.fillRect(-16,-28,32,42);
    // Shirt
    ctx.fillStyle='#ddd';
    ctx.fillRect(-18,-30,36,18);
    ctx.fillStyle='#333';
    ctx.fillRect(-6,-22,12,16);
    // Legs
    ctx.fillStyle='#2a2a3a';
    ctx.fillRect(-12,14,12,32);
    ctx.fillRect(0,14,12,32);
    // Sandals
    ctx.fillStyle='#444';
    ctx.fillRect(-14,44,14,10);
    ctx.fillRect(0,44,14,10);
    // Head
    ctx.fillStyle='#ffddbb';
    ctx.beginPath();ctx.arc(0,-43,15,0,Math.PI*2);ctx.fill();
    // Hair (dark blue, back-swept)
    ctx.fillStyle='#1a1a3a';
    ctx.beginPath();ctx.arc(0,-46,17,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(-16,-50,32,20);
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*0.7+Math.PI*0.15;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a-0.15)*14,-43+Math.sin(a-0.15)*14);
      ctx.lineTo(Math.cos(a)*24,-43+Math.sin(a)*24);
      ctx.lineTo(Math.cos(a+0.15)*14,-43+Math.sin(a+0.15)*14);
      ctx.fill();
    }
    // Sharingan eyes
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(-5,-46,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-46,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff0000';
    ctx.beginPath();ctx.arc(-5,-46,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-46,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(-5,-46,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-46,1,0,Math.PI*2);ctx.fill();
    // Mouth
    ctx.strokeStyle='#000';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-4,-37);ctx.lineTo(4,-37);ctx.stroke();
    // Arms
    ctx.fillStyle='#ffddbb';
    ctx.fillRect(16,-22,10,20);
    ctx.fillRect(-26,-18,10,18);
    // Sword on back
    ctx.strokeStyle='#888';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-10,-40);ctx.lineTo(22,5);ctx.stroke();
    ctx.fillStyle='#555';
    ctx.fillRect(-14,-42,8,10);
  }
  
  // ============ STATE CHECK ============
  resetForRound(){
    this.hp=CONFIG.MAX_HP;
    this.displayHp=CONFIG.MAX_HP;
    this.chakra=CONFIG.START_CHAKRA;
    this.x=this.isPlayer?200:CONFIG.WIDTH-200;
    this.y=CONFIG.GROUND_Y;
    this.vx=0;this.vy=0;
    this.state='idle';this.stateTimer=0;
    this.stateData={};
    this.cdSkill1=0;this.cdSkill2=0;this.cdScroll=0;this.cdSummon=0;this.cdSub=0;
    this.subReady=true;this.subCooldown=0;
    this.invincible=0;this.superArmor=0;this.hyperArmor=0;
    this.isGuarding=false;this.guardHealth=200;
    this.protection=0;this.wasKnockedDown=false;this.knockdownInvincible=0;
    this.usedUltimate=false;this.comboStage=0;this.comboDmg=0;
    this.facing=this.isPlayer?1:-1;
  }
  
  chakraBoost(){
    this.chakra=Math.min(this.maxChakra,this.chakra+1);
  }
  
  getRect(){
    return {x:this.x-18,y:this.y-55,w:36,h:80};
  }
}

// ============================================================
//  AI CONTROLLER
// ============================================================
class AIController {
  constructor(){
    this.decisionTimer=0;
    this.currentAction=null;
    this.actionTimer=0;
    this.reactionDelay=0;
    this.personality='balanced';
    this.stuckTimer=0;
    this.lastX=0;
    this.subUsedThisRound=0;
  }
  
  update(fighter,opponent,dt){
    this.decisionTimer+=dt;
    this.actionTimer-=dt;
    fighter.faceOpponent(opponent);
    const dx=opponent.x-fighter.x;
    const dist=Math.abs(dx);
    
    if(this.decisionTimer>0.15+this.reactionDelay){
      this.decisionTimer=0;
      this.reactionDelay=randRange(0.05,0.25);
      this._decide(fighter,opponent,dx,dist);
    }
    
    // Execute current action
    this._executeAction(fighter,opponent,dx,dist,dt);
    
    // Anti-stuck
    if(Math.abs(fighter.x-this.lastX)<5){this.stuckTimer+=dt;}
    else{this.stuckTimer=0;}
    this.lastX=fighter.x;
    if(this.stuckTimer>2){fighter.vx=(Math.random()-0.5)*200;this.stuckTimer=0;}
  }
  
  _decide(fighter,opponent,dx,dist){
    // Substitution check
    if(fighter.subReady&&fighter.subCooldown<=0&&fighter.chakra>=1&&['hit','heavyHit','knockdown'].includes(fighter.state)){
      fighter.useSubstitution(opponent);
      this.subUsedThisRound++;
      return;
    }
    
    if(!fighter.canAct()) return;
    
    // Ultimate check
    if(fighter.chakra>=4&&!fighter.usedUltimate&&opponent.hp<CONFIG.MAX_HP*0.5&&dist<250){
      fighter.startUltimate(opponent,fighter.isPlayer?1:-1);
      this.actionTimer=2.5;
      return;
    }
    
    // Summon
    if(fighter.cdSummon<=0&&fighter.summonType!=='none'&&Math.random()<0.6){
      fighter.startSummon(opponent,fighter.isPlayer?1:-1);
      this.actionTimer=0.5;
      return;
    }
    
    // Scroll
    if(fighter.cdScroll<=0&&fighter.scrollType!=='none'&&Math.random()<0.5&&dist<350){
      fighter.startScroll(opponent);
      this.actionTimer=0.4;
      return;
    }
    
    // Skills
    if(fighter.cdSkill2<=0&&dist<200&&Math.random()<0.6){
      fighter.startSkill2(opponent);
      this.actionTimer=0.7;
      return;
    }
    if(fighter.cdSkill1<=0&&dist<150&&Math.random()<0.5){
      fighter.startSkill1(opponent);
      this.actionTimer=0.6;
      return;
    }
    
    // Basic attack
    if(dist<70&&Math.random()<0.7){
      fighter.startBasicAttack(opponent);
      this.actionTimer=0.3;
      return;
    }
    
    // Random guard
    if(Math.random()<0.08&&dist<150&&!fighter.isGuarding){
      fighter.isGuarding=true;
      this.actionTimer=0.6;
      return;
    }
  }
  
  _executeAction(fighter,opponent,dx,dist,dt){
    if(!fighter.canAct()){
      fighter.vx*=0.9;
      return;
    }
    
    const moveDir=dx>0?1:-1;
    
    // Approach or retreat based on HP and situation
    if(dist>120){
      fighter.vx=lerp(fighter.vx,moveDir*CONFIG.MOVE_SPEED,dt*6);
    }else if(dist<60){
      fighter.vx=lerp(fighter.vx,-moveDir*CONFIG.MOVE_SPEED*0.5,dt*4);
    }else{
      fighter.vx=lerp(fighter.vx,randRange(-80,80),dt*3);
    }
    
    // Clean up guard
    if(fighter.isGuarding&&this.actionTimer<=0){
      if(Math.random()<0.3) fighter.isGuarding=false;
    }
  }
  
  reset(){
    this.decisionTimer=0;this.actionTimer=0;this.stuckTimer=0;this.lastX=0;
    this.subUsedThisRound=0;
  }
}

// ============================================================
//  INPUT MANAGER
// ============================================================
class InputManager {
  constructor(){
    this.keys={};
    this.pressedKeys={};
    this.touchDir={x:0,y:0};
    this.touchActive=false;
    this.touchBtns={};
    this.joystickId=null;
    this.joystickBase={x:0,y:0};
    
    window.addEventListener('keydown',e=>{
      if(!this.keys[e.key.toLowerCase()]){
        this.pressedKeys[e.key.toLowerCase()]=true;
      }
      this.keys[e.key.toLowerCase()]=true;
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    });
    window.addEventListener('keyup',e=>{this.keys[e.key.toLowerCase()]=false;});
    
    // Touch joystick
    const jsArea=document.getElementById('joystick-area');
    const jsThumb=document.getElementById('joystick-thumb');
    if(jsArea){
      jsArea.addEventListener('touchstart',e=>{
        e.preventDefault();
        const t=e.changedTouches[0];
        const rect=jsArea.getBoundingClientRect();
        this.joystickBase={x:rect.left+rect.width/2,y:rect.top+rect.height/2};
        this.joystickId=t.identifier;
        this.touchActive=true;
        this._updateJoystick(t);
      });
      jsArea.addEventListener('touchmove',e=>{
        e.preventDefault();
        for(const t of e.changedTouches){
          if(t.identifier===this.joystickId) this._updateJoystick(t);
        }
      });
      jsArea.addEventListener('touchend',e=>{
        for(const t of e.changedTouches){
          if(t.identifier===this.joystickId){
            this.joystickId=null;this.touchActive=false;this.touchDir={x:0,y:0};
            jsThumb.style.transform='translate(-50%,-50%)';
          }
        }
      });
    }
    
    // Touch buttons
    document.querySelectorAll('.mbtn').forEach(btn=>{
      btn.addEventListener('touchstart',e=>{
        e.preventDefault();
        this.touchBtns[btn.dataset.action]=true;
        btn.style.transform='scale(0.9)';
      });
      btn.addEventListener('touchend',e=>{
        e.preventDefault();
        this.touchBtns[btn.dataset.action]=false;
        btn.style.transform='';
      });
    });
  }
  
  _updateJoystick(touch){
    const dx=touch.clientX-this.joystickBase.x;
    const dy=touch.clientY-this.joystickBase.y;
    const dist=Math.hypot(dx,dy);
    const maxDist=50;
    const clampDist=Math.min(dist,maxDist);
    const nx=dist>0?dx/dist:0,ny=dist>0?dy/dist:0;
    this.touchDir={x:nx*clampDist/maxDist,y:ny*clampDist/maxDist};
    const thumb=document.getElementById('joystick-thumb');
    if(thumb){
      thumb.style.transform=`translate(calc(-50% + ${nx*clampDist}px), calc(-50% + ${ny*clampDist}px))`;
    }
  }
  
  isDown(action){
    const keyMap={left:['a','arrowleft'],right:['d','arrowright'],up:['w','arrowup'],down:['s','arrowdown'],
      attack:['j'],skill1:['k'],skill2:['l'],scroll:['u'],summon:['i'],ultimate:['o'],sub:[' ']};
    const keys=keyMap[action]||[];
    for(const k of keys) if(this.keys[k]) return true;
    if(this.touchBtns[action]) return true;
    return false;
  }
  
  isPressed(action){
    const keyMap={attack:['j'],skill1:['k'],skill2:['l'],scroll:['u'],summon:['i'],ultimate:['o'],sub:[' ']};
    const keys=keyMap[action]||[];
    for(const k of keys){
      if(this.pressedKeys[k]){this.pressedKeys[k]=false;return true;}
    }
    if(this.touchBtns[action]){this.touchBtns[action]=false;return true;}
    return false;
  }
  
  getDirection(){
    let dx=0,dy=0;
    if(this.isDown('left')) dx-=1;
    if(this.isDown('right')) dx+=1;
    if(this.isDown('up')) dy-=1;
    if(this.isDown('down')) dy+=1;
    if(this.touchActive){
      dx+=this.touchDir.x;
      dy+=this.touchDir.y;
    }
    const len=Math.hypot(dx,dy);
    if(len>1){dx/=len;dy/=len;}
    return {x:dx,y:dy};
  }
  
  isGuarding(){return this.isDown('down');}
  
  clearPresses(){this.pressedKeys={};}
}

// ============================================================
//  BATTLE MANAGER
// ============================================================
class BattleManager {
  constructor(){
    this.round=0;
    this.playerWins=0;
    this.cpuWins=0;
    this.timer=CONFIG.ROUND_TIME;
    this.state='waiting'; // waiting, intro, fighting, roundEnd, matchEnd, ougi
    this.stateTimer=0;
    this.roundWinner=null;
    this.matchWinner=null;
    this.player=null;
    this.cpu=null;
    this.playerCombo=0;
    this.cpuCombo=0;
    this.comboTimer=0;
    this.ougiFighter=null;
    this.ougiTimer=0;
    this.introMessages=[];
    this.fightTextTimer=0;
  }
  
  init(playerNinja,playerScroll,playerSummon,cpuNinja,cpuScroll,cpuSummon){
    this.player=new Fighter(playerNinja,playerScroll,playerSummon,200,1,true);
    this.cpu=new Fighter(cpuNinja,cpuScroll,cpuSummon,CONFIG.WIDTH-200,-1,false);
    this.player.facing=1;this.cpu.facing=-1;
    this.round=0;this.playerWins=0;this.cpuWins=0;
    this.state='intro';this.stateTimer=1.5;
    this.timer=CONFIG.ROUND_TIME;
    this.introMessages=['ROUND 1 - FIGHT!'];
    this.fightTextTimer=1.5;
    this.playerCombo=0;this.cpuCombo=0;
    this.roundWinner=null;this.matchWinner=null;
    this.ougiFighter=null;
  }
  
  startNewRound(){
    if(this.matchWinner) return;
    this.round++;
    this.timer=CONFIG.ROUND_TIME;
    this.player.resetForRound();
    this.cpu.resetForRound();
    this.player.x=200;this.player.facing=1;
    this.cpu.x=CONFIG.WIDTH-200;this.cpu.facing=-1;
    this.state='intro';this.stateTimer=1.2;
    this.fightTextTimer=1.2;
    this.introMessages=[`ROUND ${this.round} - FIGHT!`];
    this.roundWinner=null;
    this.playerCombo=0;this.cpuCombo=0;
    game.ai.reset();
    game.particles.clear();
    game.summons.length=0;
    game.projectiles.length=0;
    game.screenShake=0;
    game.hitstop=0;
    
    // Ougi kill bonus: extra chakra for next round
    if(this.ougiKillBonus){
      this.player.chakraBoost();
      this.ougiKillBonus=false;
    }
    if(this.ougiKillBonusCPU){
      this.cpu.chakraBoost();
      this.ougiKillBonusCPU=false;
    }
  }
  
  update(dt){
    if(this.state==='waiting') return;
    
    // Handle ougi screen
    if(this.state==='ougi'){
      this.ougiTimer-=dt;
      if(this.ougiTimer<=0){
        this.state='roundEnd';
        this._endRound();
      }
      return;
    }
    
    if(this.state==='intro'){
      this.stateTimer-=dt;
      this.fightTextTimer-=dt;
      if(this.stateTimer<=0) this.state='fighting';
      return;
    }
    
    if(this.state==='roundEnd'){
      this.stateTimer-=dt;
      if(this.stateTimer<=0){
        if(this.matchWinner) this.state='matchEnd';
        else this.startNewRound();
      }
      return;
    }
    
    if(this.state!=='fighting') return;
    
    // Timer
    this.timer-=dt;
    if(this.timer<=0){
      this.timer=0;
      this._timeUp();
      return;
    }
    
    // Check HP
    if(this.player.hp<=0||this.cpu.hp<=0){
      this._endRound();
    }
  }
  
  _endRound(){
    if(this.player.hp>this.cpu.hp||this.cpu.hp<=0){
      this.roundWinner='player';
      this.playerWins++;
    }else if(this.cpu.hp>this.player.hp||this.player.hp<=0){
      this.roundWinner='cpu';
      this.cpuWins++;
    }else{
      this.roundWinner='draw';
    }
    
    // Check match winner
    if(this.playerWins>=2){this.matchWinner='player';this.state='matchEnd';}
    else if(this.cpuWins>=2){this.matchWinner='cpu';this.state='matchEnd';}
    else{this.state='roundEnd';this.stateTimer=2;}
  }
  
  _timeUp(){
    if(this.player.hp>this.cpu.hp){
      this.roundWinner='player';this.playerWins++;
    }else if(this.cpu.hp>this.player.hp){
      this.roundWinner='cpu';this.cpuWins++;
    }else{
      this.roundWinner='draw';
    }
    if(this.playerWins>=2) this.matchWinner='player';
    else if(this.cpuWins>=2) this.matchWinner='cpu';
    this.state=this.matchWinner?'matchEnd':'roundEnd';
    this.stateTimer=2;
  }
  
  addCombo(ownerId){
    if(ownerId>0) this.playerCombo++;
    else this.cpuCombo++;
    this.comboTimer=2;
  }
  
  onUltimateStart(ownerId){
    // Could add special effects
  }
  
  checkOugiKill(ownerId){
    const opponent=ownerId>0?this.cpu:this.player;
    if(opponent.hp<=0){
      this.state='ougi';
      this.ougiTimer=2.5;
      this.ougiFighter=ownerId>0?this.player:this.cpu;
      if(ownerId>0) this.ougiKillBonus=true;
      else this.ougiKillBonusCPU=true;
      game.particles.clear();
    }
  }
  
  drawUI(ctx){
    const W=CONFIG.WIDTH,H=CONFIG.HEIGHT;
    
    // Background gradient bars
    const barY=10,barH=16,barW=200;
    
    // Player HP bar (left)
    this._drawHPBar(ctx,20,barY,barW,barH,this.player.displayHp,CONFIG.MAX_HP,'#44aa44','#ff4444',true);
    // Chakra dots for player
    this._drawChakraDots(ctx,20+barW+10,barY+barH/2,this.player.chakra,false);
    
    // CPU HP bar (right)
    this._drawHPBar(ctx,W-20-barW,barY,barW,barH,this.cpu.displayHp,CONFIG.MAX_HP,'#44aa44','#ff4444',false);
    this._drawChakraDots(ctx,W-20-barW-20,barY+barH/2,this.cpu.chakra,true);
    
    // Timer
    const timerStr=Math.ceil(this.timer).toString();
    ctx.fillStyle='#fff';
    ctx.font='bold 22px "Microsoft YaHei"';
    ctx.textAlign='center';
    ctx.fillText(timerStr,W/2,barY+barH-2);
    
    // Round indicators
    ctx.font='11px "Microsoft YaHei"';
    ctx.fillStyle='#aaa';
    ctx.fillText(`ROUND ${this.round}/${CONFIG.MAX_ROUNDS}`,W/2,barY+barH+14);
    
    // Win dots
    for(let i=0;i<CONFIG.MAX_ROUNDS;i++){
      const dotX=W/2-20+i*16,dotY=barY-6;
      ctx.beginPath();ctx.arc(dotX,dotY,4,0,Math.PI*2);
      if(i<this.playerWins){ctx.fillStyle='#ffaa00';ctx.fill();}
      else if(i<this.cpuWins){ctx.fillStyle='#6666ff';ctx.fill();}
      else{ctx.fillStyle='#555';ctx.fill();ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.stroke();}
    }
    
    // Combo counter
    if(this.playerCombo>=3){
      ctx.fillStyle='#ffaa00';ctx.font='bold 26px "Microsoft YaHei"';
      ctx.textAlign='center';
      ctx.fillText(`${this.playerCombo} HITS!`,W/2,H-230);
    }
    
    // Fight text
    if(this.fightTextTimer>0){
      const alpha=Math.min(1,this.fightTextTimer/0.5);
      ctx.fillStyle=`rgba(255,255,255,${alpha})`;
      ctx.font='bold 48px "Microsoft YaHei"';
      ctx.textAlign='center';
      const txt=this.introMessages[0]||'';
      ctx.fillText(txt,W/2,H/2-40);
      this.fightTextTimer-=1/60;
    }
    
    // Round end text
    if(this.state==='roundEnd'&&this.roundWinner){
      const winName=this.roundWinner==='player'?'ROUND WIN!':'ROUND LOSS';
      const c=this.roundWinner==='player'?'#ffaa00':'#6666ff';
      ctx.fillStyle=c;ctx.font='bold 36px "Microsoft YaHei"';
      ctx.textAlign='center';
      ctx.fillText(winName,W/2,H/2);
    }
    
    // Match end
    if(this.state==='matchEnd'){
      const winName=this.matchWinner==='player'?'VICTORY!':'DEFEAT...';
      const c=this.matchWinner==='player'?'#ffaa00':'#6666ff';
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle=c;ctx.font='bold 56px "Microsoft YaHei"';
      ctx.textAlign='center';
      ctx.fillText(winName,W/2,H/2-10);
      ctx.fillStyle='#ccc';ctx.font='18px "Microsoft YaHei"';
      ctx.fillText('点击"再来一局"继续战斗',W/2,H/2+40);
      
      // Show rematch button
      document.getElementById('result-screen').classList.add('active');
      const rt=document.getElementById('result-text');
      rt.textContent=winName;
      rt.className='result-text '+(this.matchWinner==='player'?'win':'lose');
      document.getElementById('result-detail').textContent=`比分: ${this.playerWins} - ${this.cpuWins}`;
    }
  }
  
  _drawHPBar(ctx,x,y,w,h,hp,maxHp,colorFull,colorEmpty,leftToRight){
    const ratio=hp/maxHp;
    // Background
    ctx.fillStyle='#333';
    ctx.fillRect(x,y,w,h);
    // Border
    ctx.strokeStyle='#666';ctx.lineWidth=1;
    ctx.strokeRect(x,y,w,h);
    // Health
    const grad=ctx.createLinearGradient(x,y,x+(leftToRight?w:-w),y);
    if(ratio>0.5) grad.addColorStop(0,colorFull);
    else if(ratio>0.25) grad.addColorStop(0,'#ffaa00');
    else grad.addColorStop(0,colorEmpty);
    grad.addColorStop(1,ratio>0.5?colorFull:ratio>0.25?'#ffaa00':colorEmpty);
    ctx.fillStyle=grad;
    if(leftToRight) ctx.fillRect(x,y,w*ratio,h);
    else ctx.fillRect(x+w*(1-ratio),y,w*ratio,h);
    // Shine
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(x,y,w*ratio,Math.floor(h/3));
  }
  
  _drawChakraDots(ctx,cx,cy,chakra,rightAlign){
    for(let i=0;i<CONFIG.MAX_CHAKRA;i++){
      const dx=rightAlign?-(i*18):i*18;
      const x=cx+dx;
      ctx.beginPath();
      if(i<chakra){
        // Filled chakra flame
        const grad=ctx.createRadialGradient(x,cy,2,x,cy,7);
        grad.addColorStop(0,'#ffdd00');grad.addColorStop(0.6,'#ff6600');grad.addColorStop(1,'#cc3300');
        ctx.fillStyle=grad;
        ctx.arc(x,cy,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,200,0.6)';
        ctx.arc(x,cy-1,3,0,Math.PI*2);ctx.fill();
      }else{
        ctx.fillStyle='rgba(100,100,100,0.5)';
        ctx.arc(x,cy,6,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#555';ctx.lineWidth=1;
        ctx.stroke();
      }
    }
  }
}

// ============================================================
//  RENDERER
// ============================================================
function drawBackground(ctx){
  const W=CONFIG.WIDTH,H=CONFIG.HEIGHT;
  // Sky gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a2a4a');
  grad.addColorStop(0.5,'#3a5a8a');
  grad.addColorStop(0.85,'#6a8a6a');
  grad.addColorStop(1,'#4a6a3a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  
  // Mountains
  ctx.fillStyle='#2a3a2a';
  ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,CONFIG.GROUND_Y+20);
  for(let x=0;x<W;x+=40){ctx.lineTo(x,CONFIG.GROUND_Y+20+Math.sin(x*0.008)*30+Math.sin(x*0.02)*15);}
  ctx.lineTo(W,CONFIG.GROUND_Y+20);ctx.lineTo(W,H);ctx.fill();
  
  // Ground
  ctx.fillStyle='#5a4a2a';
  ctx.fillRect(0,CONFIG.GROUND_Y+8,W,H-CONFIG.GROUND_Y-8);
  ctx.fillStyle='#7a6a3a';
  ctx.fillRect(0,CONFIG.GROUND_Y+8,W,4);
  
  // Ground line
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,CONFIG.GROUND_Y+8);ctx.lineTo(W,CONFIG.GROUND_Y+8);ctx.stroke();
  
  // Center circle
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(W/2,CONFIG.GROUND_Y+8,80,Math.PI,0);ctx.stroke();
  
  // Particles in background
  for(let i=0;i<15;i++){
    const px=((i*173+37)%W),py=((i*259+83)%(CONFIG.GROUND_Y/2));
    ctx.fillStyle=`rgba(255,255,255,${0.03+Math.sin(Date.now()/2000+i)*0.02})`;
    ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fill();
  }
}

function drawGroundEffects(ctx,fighter){
  if(fighter.y>=CONFIG.GROUND_Y-5&&Math.abs(fighter.vx)>50){
    const dustCount=Math.floor(Math.abs(fighter.vx)/30);
    for(let i=0;i<dustCount;i++){
      ctx.fillStyle='rgba(180,160,140,0.3)';
      ctx.beginPath();
      ctx.arc(fighter.x+randRange(-10,10),CONFIG.GROUND_Y+4,randRange(2,5),0,Math.PI*2);
      ctx.fill();
    }
  }
}

function drawOugiIllustration(ctx,fighter){
  const W=CONFIG.WIDTH,H=CONFIG.HEIGHT;
  
  // Dark overlay
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,W,H);
  
  // Radial glow
  const grad=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,400);
  if(fighter.ninjaType==='naruto'){
    grad.addColorStop(0,'rgba(255,136,0,0.3)');
    grad.addColorStop(0.5,'rgba(255,100,0,0.1)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
  }else{
    grad.addColorStop(0,'rgba(100,80,255,0.3)');
    grad.addColorStop(0.5,'rgba(80,60,220,0.1)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
  }
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  
  // Large character portrait
  ctx.save();
  ctx.translate(W/2,H/2-20);
  ctx.scale(2.5,2.5);
  
  if(fighter.ninjaType==='naruto'){
    // Large Naruto portrait
    // Face
    ctx.fillStyle='#ffcc88';
    ctx.beginPath();ctx.arc(0,-5,20,0,Math.PI*2);ctx.fill();
    // Hair
    ctx.fillStyle='#ffdd44';
    for(let i=0;i<9;i++){
      const a=(i/9)*Math.PI*2-Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a-0.15)*18,-5+Math.sin(a-0.15)*18);
      ctx.lineTo(Math.cos(a)*30,-5+Math.sin(a)*30);
      ctx.lineTo(Math.cos(a+0.15)*18,-5+Math.sin(a+0.15)*18);
      ctx.fill();
    }
    // Headband
    ctx.fillStyle='#3355aa';ctx.fillRect(-22,-12,44,8);
    ctx.fillStyle='#ccc';ctx.fillRect(-7,-13,14,12);
    // Eyes
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-8,-6,3.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(8,-6,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#44aaff';ctx.beginPath();ctx.arc(-8,-6,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(8,-6,2.5,0,Math.PI*2);ctx.fill();
    // Whiskers
    ctx.strokeStyle='#cc9966';ctx.lineWidth=1.5;
    for(let s=-1;s<=1;s+=2){
      ctx.beginPath();ctx.moveTo(s*14,-1);ctx.lineTo(s*24,1);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*13,3);ctx.lineTo(s*23,5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(s*14,7);ctx.lineTo(s*24,9);ctx.stroke();
    }
    // Mouth
    ctx.strokeStyle='#000';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,2,7,0.2,Math.PI-0.2);ctx.stroke();
    
    // Text
    ctx.restore();
    ctx.fillStyle='#ff8800';ctx.font='bold 36px "Microsoft YaHei"';
    ctx.textAlign='center';
    ctx.shadowColor='#ff6600';ctx.shadowBlur=20;
    ctx.fillText('うずまきナルト',W/2,H/2+60);
    ctx.fillStyle='#ffcc00';ctx.font='bold 24px "Microsoft YaHei"';
    ctx.fillText('風遁・螺旋手里剣',W/2,H/2+95);
    ctx.shadowBlur=0;
  }else{
    // Large Sasuke portrait
    ctx.fillStyle='#ffddbb';
    ctx.beginPath();ctx.arc(0,-5,19,0,Math.PI*2);ctx.fill();
    // Hair
    ctx.fillStyle='#1a1a3a';
    ctx.beginPath();ctx.arc(0,-8,22,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(-22,-12,44,18);
    for(let i=0;i<6;i++){
      const a=(i/6)*Math.PI*0.7+Math.PI*0.15;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a-0.13)*17,-3+Math.sin(a-0.13)*17);
      ctx.lineTo(Math.cos(a)*28,-3+Math.sin(a)*28);
      ctx.lineTo(Math.cos(a+0.13)*17,-3+Math.sin(a+0.13)*17);
      ctx.fill();
    }
    // Sharingan
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-7,-7,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(7,-7,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff0000';ctx.beginPath();ctx.arc(-7,-7,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(7,-7,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-7,-7,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(7,-7,1.5,0,Math.PI*2);ctx.fill();
    // Mouth
    ctx.strokeStyle='#000';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-5,2);ctx.lineTo(5,2);ctx.stroke();
    
    ctx.restore();
    ctx.fillStyle='#8866ff';ctx.font='bold 36px "Microsoft YaHei"';
    ctx.textAlign='center';
    ctx.shadowColor='#6644cc';ctx.shadowBlur=20;
    ctx.fillText('うちはサスケ',W/2,H/2+60);
    ctx.fillStyle='#ccbbff';ctx.font='bold 24px "Microsoft YaHei"';
    ctx.fillText('雷遁・麒麟',W/2,H/2+95);
    ctx.shadowBlur=0;
  }
  
  // Dramatic lines
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=1;
  for(let i=0;i<8;i++){
    const y=20+i*70;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  
  // Corner decorations
  const corners=[[30,30,-1,-1],[W-30,30,1,-1],[30,H-30,-1,1],[W-30,H-30,1,1]];
  for(const[cx,cy,dx,dy] of corners){
    ctx.strokeStyle='rgba(255,200,100,0.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx,cy+dy*20);ctx.lineTo(cx,cy);ctx.lineTo(cx+dx*20,cy);ctx.stroke();
  }
}

// ============================================================
//  MAIN GAME LOOP
// ============================================================
function gameLoop(timestamp){
  requestAnimationFrame(gameLoop);
  
  if(!game.lastTime){game.lastTime=timestamp;return;}
  let dt=(timestamp-game.lastTime)/1000;
  game.lastTime=timestamp;
  dt=Math.min(dt,0.1); // Cap delta
  
  // Hitstop
  if(game.hitstop>0){
    game.hitstop-=dt;
    if(game.hitstop>0) return;
  }
  
  const W=CONFIG.WIDTH,H=CONFIG.HEIGHT;
  const ctx=game.ctx;
  
  // Only run game logic if fighting
  if(game.battle.state==='fighting'){
    const player=game.battle.player;
    const cpu=game.battle.cpu;
    
    // === PLAYER INPUT ===
    const dir=game.input.getDirection();
    
    if(player.canAct()){
      player.vx=lerp(player.vx,dir.x*CONFIG.MOVE_SPEED,dt*8);
      if(dir.x===0) player.vx*=0.85;
      else player.faceOpponent(cpu);
    }
    
    // Jump
    if(dir.y<-0.5&&player.y>=CONFIG.GROUND_Y-2&&player.canAct()){
      player.vy=CONFIG.JUMP_VEL;
    }
    
    // Guard
    if(game.input.isGuarding()&&player.y>=CONFIG.GROUND_Y-2&&player.canAct()){
      player.isGuarding=true;
    }else if(!game.input.isGuarding()){
      player.isGuarding=false;
    }
    
    // Attack buttons
    if(game.input.isPressed('attack')) player.startBasicAttack(cpu);
    if(game.input.isPressed('skill1')) player.startSkill1(cpu);
    if(game.input.isPressed('skill2')) player.startSkill2(cpu);
    if(game.input.isPressed('scroll')) player.startScroll(cpu);
    if(game.input.isPressed('summon')) player.startSummon(cpu,1);
    if(game.input.isPressed('ultimate')) player.startUltimate(cpu,1);
    if(game.input.isPressed('sub')) player.useSubstitution(cpu);
    
    // === CPU AI ===
    game.ai.update(cpu,player,dt);
    
    // === UPDATE FIGHTERS ===
    player.update(dt,cpu,1);
    cpu.update(dt,player,-1);
    
    // === UPDATE PROJECTILES ===
    for(let i=game.projectiles.length-1;i>=0;i--){
      const p=game.projectiles[i];
      p.update(dt);
      if(!p.alive){game.projectiles.splice(i,1);continue;}
      // Hit detection
      const target=p.owner>0?cpu:player;
      if(!p.hasHit&&rectOverlap(p.getRect(),target.getRect())){
        p.hasHit=true;
        const dealt=target.takeDamage(p.damage,p.owner,p.vx>0?1:-1);
        if(dealt>0){
          game.particles.emit(p.x,p.y,10,p.color,0.3,150,4);
          if(p.owner>0) player.addChakra(1);
          else cpu.addChakra(1);
        }
        p.alive=false;
      }
    }
    
    // === UPDATE SUMMONS ===
    for(let i=game.summons.length-1;i>=0;i--){
      const s=game.summons[i];
      const summonOwner=s.owner>0?player:cpu;
      const summonTarget=s.owner>0?cpu:player;
      s.update(dt,summonTarget,summonOwner);
      if(!s.alive) game.summons.splice(i,1);
    }
    
    // Reset combo if timer expired
    if(game.battle.comboTimer>0){
      game.battle.comboTimer-=dt;
      if(game.battle.comboTimer<=0){
        game.battle.playerCombo=0;
        game.battle.cpuCombo=0;
      }
    }
  }
  
  // === UPDATE BATTLE ===
  game.battle.update(dt);
  
  // === UPDATE PARTICLES ===
  game.particles.update(dt);
  
  // === RENDER ===
  ctx.clearRect(0,0,W,H);
  
  // Screen shake
  ctx.save();
  if(game.screenShake>0){
    const sx=randRange(-game.screenShake*12,game.screenShake*12);
    const sy=randRange(-game.screenShake*12,game.screenShake*12);
    ctx.translate(sx,sy);
    game.screenShake=Math.max(0,game.screenShake-dt*2);
  }
  
  drawBackground(ctx);
  
  // Draw summons
  for(const s of game.summons) s.draw(ctx);
  
  // Draw ground effects
  if(game.battle.player) drawGroundEffects(ctx,game.battle.player);
  if(game.battle.cpu) drawGroundEffects(ctx,game.battle.cpu);
  
  // Draw fighters
  if(game.battle.player) game.battle.player.draw(ctx);
  if(game.battle.cpu) game.battle.cpu.draw(ctx);
  
  // Draw projectiles
  for(const p of game.projectiles) p.draw(ctx);
  
  // Draw particles
  game.particles.draw(ctx);
  
  ctx.restore();
  
  // Draw Ougi illustration
  if(game.battle.state==='ougi'&&game.battle.ougiFighter){
    drawOugiIllustration(ctx,game.battle.ougiFighter);
  }
  
  // Draw UI
  game.battle.drawUI(ctx);
  
  // Draw skill cooldown indicators (bottom of screen)
  if(game.battle.player&&game.battle.state==='fighting'){
    _drawCooldowns(ctx,game.battle.player,20,H-40,true);
    // CPU cooldowns shown above their head
    _drawCooldowns(ctx,game.battle.cpu,W-20,H-40,false);
  }
  
  game.input.clearPresses();
}

function _drawCooldowns(ctx,fighter,x,y,leftAlign){
  const skills=[
    {name:'技1',cd:fighter.cdSkill1,max:fighter.maxCD('skill1'),color:'#ff8844'},
    {name:'技2',cd:fighter.cdSkill2,max:fighter.maxCD('skill2'),color:'#ff6644'},
    {name:'卷',cd:fighter.cdScroll,max:fighter.maxCD('scroll'),color:'#ffdd44'},
    {name:'灵',cd:fighter.cdSummon,max:fighter.maxCD('summon'),color:'#ff44aa'},
  ];
  
  ctx.font='9px "Microsoft YaHei"';
  
  for(let i=0;i<skills.length;i++){
    const s=skills[i];
    const dx=leftAlign?i*44:-(skills.length-i)*44;
    const bx=x+dx,by=y;
    
    // Background
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(bx,by,38,18);
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
    ctx.strokeRect(bx,by,38,18);
    
    // Name
    ctx.fillStyle='#fff';ctx.textAlign='center';
    ctx.fillText(s.name,bx+19,by+8);
    
    // CD overlay
    if(s.cd>0){
      const ratio=s.cd/s.max;
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(bx,by,38,18*ratio);
      ctx.fillStyle='#fff';
      ctx.fillText(s.cd.toFixed(1),bx+19,by+18+10);
    }
  }
}

// ============================================================
//  INITIALIZATION
// ============================================================
function initGame(){
  game.canvas=document.getElementById('game-canvas');
  game.ctx=game.canvas.getContext('2d');
  
  function resize(){
    const container=document.getElementById('game-container');
    const W=container.clientWidth,H=container.clientHeight;
    game.canvas.width=CONFIG.WIDTH;
    game.canvas.height=CONFIG.HEIGHT;
  }
  window.addEventListener('resize',resize);
  resize();
  
  // Select screen logic
  const ninjaCards=document.querySelectorAll('#ninja-select .select-card');
  const scrollCards=document.querySelectorAll('#scroll-select .select-card');
  const summonCards=document.querySelectorAll('#summon-select .select-card');
  
  function setupSelect(cards,key){
    cards.forEach(c=>{
      c.addEventListener('click',()=>{
        cards.forEach(x=>x.classList.remove('selected'));
        c.classList.add('selected');
        const dataKey=Object.keys(c.dataset).find(k=>k.startsWith(key));
        game[key+'Ninja'===dataKey?'playerNinja':key==='scroll'?'playerScroll':'playerSummon']=c.dataset[dataKey];
      });
    });
  }
  setupSelect(ninjaCards,'ninja');
  setupSelect(scrollCards,'scroll');
  setupSelect(summonCards,'summon');
  
  document.getElementById('start-btn').addEventListener('click',startBattle);
  document.getElementById('rematch-btn').addEventListener('click',rematch);
  
  // Start game loop immediately (renders select screen until battle starts)
  game.battle.state='waiting';
  requestAnimationFrame(gameLoop);
}

function startBattle(){
  document.getElementById('select-screen').style.display='none';
  document.getElementById('result-screen').classList.remove('active');
  
  // Random CPU ninja
  const ninjas=['naruto','sasuke'];
  const scrolls=['lightning','earth'];
  const summons=['gamakichi','katsuyu'];
  game.cpuNinja=ninjas[randInt(0,1)];
  game.cpuScroll=scrolls[randInt(0,1)];
  game.cpuSummon=summons[randInt(0,1)];
  
  game.battle.init(game.playerNinja,game.playerScroll,game.playerSummon,game.cpuNinja,game.cpuScroll,game.cpuSummon);
  game.particles.clear();
  game.projectiles.length=0;
  game.summons.length=0;
  game.screenShake=0;
  game.hitstop=0;
  game.ai.reset();
  game.battle.ougiKillBonus=false;
  game.battle.ougiKillBonusCPU=false;
}

function rematch(){
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('select-screen').style.display='flex';
  game.battle.state='waiting';
  game.battle.matchWinner=null;
  game.battle.roundWinner=null;
  game.particles.clear();
  game.projectiles.length=0;
  game.summons.length=0;
  game.screenShake=0;
  game.hitstop=0;
}

// Draw waiting background when in select
const origDrawBg=drawBackground;
drawBackground=function(ctx){
  if(game.battle.state==='waiting'){
    ctx.fillStyle='#111';ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
    return;
  }
  origDrawBg(ctx);
};

// Start
initGame();
console.log('🔥 火影忍者手游 Demo 已就绪');

console.log('忍者: 漩涡鸣人 / 宇智波佐助');
</script>
