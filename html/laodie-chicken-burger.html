<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老爹炸鸡汉堡店</title>
<style>
  :root{
    --bun:#f0b45c; --meat:#8a4b2a; --red:#e74c3c; --green:#2ecc71;
    --yellow:#ffd54a; --brown:#5b3a29; --cream:#fff6e5; --ink:#3a2417;
    --panel:#fff9f0; --shadow:rgba(60,30,10,.25);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:
      radial-gradient(circle at 20% 15%,#ffe08a 0,transparent 40%),
      radial-gradient(circle at 85% 10%,#ffb0c4 0,transparent 45%),
      linear-gradient(160deg,#ffd36b,#ff9f5a 60%,#ff7e5f);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    min-height:100%; overflow:hidden; user-select:none;
  }
  #game{
    width:min(980px,98vw); height:min(640px,98vh);
    background:var(--panel);
    border:8px solid #fff; border-radius:26px;
    box-shadow:0 18px 50px var(--shadow),0 0 0 8px #ffbf47;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }

  /* ---------- HUD ---------- */
  #hud{
    display:flex; align-items:center; gap:12px;
    padding:8px 16px; background:linear-gradient(90deg,#ff6b6b,#ff9f43);
    color:#fff; flex:0 0 auto; box-shadow:0 4px 10px var(--shadow); z-index:5;
  }
  #hud .logo{font-weight:900; font-size:20px; letter-spacing:1px; text-shadow:0 2px 0 #c0392b;}
  #hud .logo .em{font-size:22px;}
  #hud .spacer{flex:1;}
  .stat{
    background:rgba(255,255,255,.22); border-radius:12px; padding:4px 12px;
    font-weight:800; font-size:15px; display:flex; align-items:center; gap:6px;
    border:2px solid rgba(255,255,255,.5);
  }
  #btnMute{cursor:pointer; background:rgba(255,255,255,.25); border:2px solid #fff;
    border-radius:12px; width:38px; height:34px; font-size:18px; color:#fff;}
  #btnMute:active{transform:scale(.9);}

  /* ---------- ORDER RAIL ---------- */
  #rail{
    flex:0 0 auto; height:150px; display:flex; gap:10px; padding:10px 14px;
    background:repeating-linear-gradient(45deg,#ffe9c7,#ffe9c7 14px,#ffe2b6 14px,#ffe2b6 28px);
    border-bottom:4px dashed #e2b06a; overflow-x:auto; align-items:stretch;
  }
  .ticket{
    flex:0 0 168px; background:#fffdf7; border-radius:12px; padding:8px 10px;
    box-shadow:0 5px 12px var(--shadow); border:2px solid #ecd6a8;
    position:relative; display:flex; flex-direction:column; cursor:pointer;
    transition:transform .12s;
  }
  .ticket:hover{transform:translateY(-3px);}
  .ticket.active{outline:4px solid #ff6b6b; outline-offset:-2px;}
  .ticket.done{opacity:.55; filter:grayscale(.3);}
  .ticket .cust{font-size:30px; position:absolute; top:-14px; left:8px;
    background:#fff; border-radius:50%; width:42px; height:42px; display:grid;
    place-items:center; box-shadow:0 3px 8px var(--shadow); border:2px solid #ffcf6b;}
  .ticket .num{position:absolute; top:6px; right:8px; font-weight:900; color:#c0392b; font-size:13px;}
  .ticket .items{margin-top:26px; font-size:12px; line-height:1.5; font-weight:700; color:#5b3a29; overflow:hidden;}
  .ticket .items .line{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .patience{height:8px; border-radius:5px; background:#eee; margin-top:auto; overflow:hidden; border:1px solid #d9c08a;}
  .patience > i{display:block; height:100%; width:100%; background:linear-gradient(90deg,#2ecc71,#f1c40f,#e74c3c); background-size:300% 100%; background-position:0 0; transition:width .2s linear;}

  /* ---------- STATIONS ---------- */
  #stations{flex:1; display:flex; gap:10px; padding:12px; min-height:0;}
  .station{
    background:var(--cream); border-radius:16px; padding:10px;
    box-shadow:inset 0 0 0 3px #fff,0 6px 14px var(--shadow);
    display:flex; flex-direction:column; min-height:0;
  }
  .station h3{font-size:14px; color:#a15c2a; text-align:center; margin-bottom:6px; letter-spacing:1px;}
  #fryStation{flex:0 0 210px;}
  #buildStation{flex:1;}
  #serveStation{flex:0 0 190px;}

  /* Fryer */
  .fryer{background:#4a3220; border-radius:14px; padding:10px; flex:1; display:flex; flex-direction:column; gap:8px; box-shadow:inset 0 6px 12px rgba(0,0,0,.4);}
  .baskets{display:flex; flex-direction:column; gap:8px; flex:1; overflow-y:auto;}
  .basket{
    background:#2b1c10; border-radius:10px; padding:8px; display:flex; align-items:center; gap:8px;
    border:2px solid #6b4a2c; cursor:pointer; position:relative; min-height:56px;
  }
  .basket.empty{justify-content:center; color:#c8a877; font-weight:800; font-size:12px; border-style:dashed;}
  .basket .chick{font-size:30px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.5)); transition:transform .1s;}
  .basket.cooking .chick{animation:sizzle .3s infinite alternate;}
  @keyframes sizzle{from{transform:translateY(0) rotate(-4deg);}to{transform:translateY(-2px) rotate(4deg);}}
  .basket .mbar{flex:1; height:16px; background:#000; border-radius:8px; position:relative; overflow:hidden;}
  .basket .mbar .zone{position:absolute; top:0; height:100%; background:rgba(46,204,113,.45);}
  .basket .mbar .fill{position:absolute; top:0; left:0; height:100%; width:0; background:linear-gradient(90deg,#ffd54a,#ff8c1a);}
  .basket .tag{position:absolute; top:2px; right:4px; font-size:10px; font-weight:900; color:#fff;}
  .basket.done{border-color:var(--green);}
  .basket.burnt{border-color:var(--red);}
  #addChick{margin-top:2px;}

  /* Build */
  #buildStation .buildWrap{flex:1; display:flex; gap:10px; min-height:0;}
  .burgerCol{flex:0 0 150px; display:flex; flex-direction:column; align-items:center; background:#fff; border-radius:12px; padding:8px; box-shadow:inset 0 0 0 2px #ffe0a3;}
  .plate{flex:1; width:100%; display:flex; flex-direction:column-reverse; align-items:center; justify-content:flex-start; gap:0; overflow:hidden; padding-bottom:4px;}
  .layer{
    font-size:13px; font-weight:800; color:#5b3a29; width:120px; text-align:center;
    border-radius:20px; margin-top:-6px; padding:3px 0; box-shadow:0 2px 4px var(--shadow);
    animation:drop .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes drop{from{transform:translateY(-30px) scale(.7); opacity:0;}to{transform:none; opacity:1;}}
  .l-bunTop{background:var(--bun); border-radius:60px 60px 22px 22px; height:34px; line-height:34px; box-shadow:0 -4px 0 #ffcf8a inset,0 3px 5px var(--shadow);}
  .l-bunBot{background:#e0a24d; height:20px; line-height:20px;}
  .l-chick{background:#c8792e; color:#fff; height:26px; line-height:26px; border-radius:8px;}
  .l-chickPerfect{box-shadow:0 0 0 3px #2ecc71,0 3px 5px var(--shadow);}
  .l-chickBurnt{background:#5b3a29; box-shadow:0 0 0 3px #e74c3c;}
  .l-chickRaw{background:#e8b9a0; color:#7b4a2c; box-shadow:0 0 0 3px #f39c12;}
  .l-lettuce{background:#7ed957; height:16px; line-height:16px; border-radius:40px;}
  .l-tomato{background:#ff5c5c; color:#fff; height:16px; line-height:16px; border-radius:40px;}
  .l-cheese{background:#ffd12e; height:16px; line-height:16px; border-radius:6px; transform:rotate(-1deg);}
  .l-sauce{background:#ffb3c7; height:12px; line-height:12px; border-radius:40px;}
  .buildBtns{flex:1; display:flex; flex-direction:column; gap:7px; overflow-y:auto; min-height:0;}
  .buildBtns .row{display:flex; gap:7px; flex-wrap:wrap;}
  .ing{
    flex:1; min-width:64px; border:none; border-radius:12px; padding:8px 4px; cursor:pointer;
    font-weight:800; font-size:13px; color:#4a2f18; background:#fff; box-shadow:0 4px 0 #e2c68e;
    display:flex; flex-direction:column; align-items:center; gap:2px; transition:transform .08s;
  }
  .ing:active{transform:translateY(3px); box-shadow:0 1px 0 #e2c68e;}
  .ing .em{font-size:22px;}
  .ing.wide{flex-basis:100%;}
  #btnClear{background:#ffe0e0; box-shadow:0 4px 0 #f0a5a5; color:#c0392b;}

  /* Serve */
  #serveStation{align-items:stretch;}
  .sideRow{display:flex; gap:8px;}
  .sideBtn{flex:1; border:none; border-radius:12px; padding:8px 4px; cursor:pointer; font-weight:800; font-size:12px; background:#fff; box-shadow:0 4px 0 #e2c68e; color:#4a2f18;}
  .sideBtn.on{background:#c8f7c5; box-shadow:0 4px 0 #7ed957;}
  .sideBtn:active{transform:translateY(3px);}
  .traySide{font-size:12px; font-weight:800; color:#a15c2a; text-align:center; min-height:18px;}
  #btnServe{
    margin-top:auto; border:none; border-radius:16px; padding:16px; cursor:pointer;
    font-size:20px; font-weight:900; color:#fff; letter-spacing:2px;
    background:linear-gradient(#2ecc71,#27ae60); box-shadow:0 6px 0 #1e8f4e; transition:transform .08s;
  }
  #btnServe:active{transform:translateY(4px); box-shadow:0 2px 0 #1e8f4e;}
  #btnServe:disabled{filter:grayscale(.7); opacity:.6; cursor:not-allowed;}
  .hint{font-size:11px; color:#b07a3a; text-align:center; margin-top:6px; line-height:1.4;}

  /* Floating score popups */
  .pop{position:absolute; font-weight:900; font-size:22px; pointer-events:none; z-index:30;
    animation:floatUp 1.1s ease-out forwards; text-shadow:0 2px 3px rgba(0,0,0,.3);}
  @keyframes floatUp{0%{transform:translateY(0) scale(.6); opacity:0;}
    20%{opacity:1; transform:translateY(-10px) scale(1.15);}
    100%{transform:translateY(-70px) scale(1); opacity:0;}}

  /* ---------- OVERLAYS ---------- */
  .overlay{position:absolute; inset:0; background:rgba(50,25,10,.78); z-index:50;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:20px;}
  .card{background:var(--panel); border-radius:22px; padding:26px 30px; max-width:520px;
    box-shadow:0 14px 40px rgba(0,0,0,.4),0 0 0 6px #ffbf47; animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{from{transform:scale(.7); opacity:0;}to{transform:none; opacity:1;}}
  .card h1{font-size:36px; color:#e8542a; text-shadow:0 3px 0 #ffd06b; margin-bottom:6px;}
  .card h2{font-size:26px; color:#e8542a; margin-bottom:10px;}
  .card p{font-size:15px; color:#6b4a2c; line-height:1.7; margin-bottom:8px;}
  .card .big{font-size:44px; font-weight:900; color:#f39c12; margin:6px 0;}
  .stars{font-size:40px; margin:10px 0; letter-spacing:6px;}
  .btnMain{border:none; border-radius:16px; padding:14px 34px; font-size:20px; font-weight:900;
    color:#fff; cursor:pointer; background:linear-gradient(#ff8c42,#ff6b2b); box-shadow:0 6px 0 #d84f18; margin-top:12px;}
  .btnMain:active{transform:translateY(4px); box-shadow:0 2px 0 #d84f18;}
  .menuArt{font-size:70px; margin-bottom:4px;}
  .hidden{display:none !important;}
  .summaryRow{display:flex; justify-content:space-between; font-size:15px; padding:3px 0; border-bottom:1px dashed #e0c48a; color:#5b3a29; font-weight:700;}
  .summaryRow span:last-child{color:#c0392b;}
  #stations.dim{filter:blur(2px) brightness(.9);}
</style>
</head>
<body>
<div id="game">

  <div id="hud">
    <div class="logo"><span class="em">🍗</span> 老爹炸鸡汉堡店</div>
    <div class="spacer"></div>
    <div class="stat">📅 <span id="dayLabel">第1天</span></div>
    <div class="stat">👥 <span id="custLabel">0/0</span></div>
    <div class="stat">💰 $<span id="moneyLabel">0</span></div>
    <button id="btnMute" title="静音">🔊</button>
  </div>

  <div id="rail"></div>

  <div id="stations">
    <!-- FRY -->
    <div class="station" id="fryStation">
      <h3>🔥 油炸台</h3>
      <div class="fryer">
        <div class="baskets" id="baskets"></div>
      </div>
      <button class="ing wide" id="addChick" style="margin-top:8px;background:#ffe9c7;box-shadow:0 4px 0 #e2b06a;">
        <span class="em">🍗</span>放入生鸡排
      </button>
    </div>

    <!-- BUILD -->
    <div class="station" id="buildStation">
      <h3>🍔 组装台</h3>
      <div class="buildWrap">
        <div class="burgerCol">
          <div class="plate" id="plate"></div>
          <div style="font-size:11px;color:#b07a3a;margin-top:4px;">点击食材从下往上叠</div>
        </div>
        <div class="buildBtns" id="buildBtns"></div>
      </div>
    </div>

    <!-- SERVE -->
    <div class="station" id="serveStation">
      <h3>🧾 出餐台</h3>
      <div class="hint" id="orderRecap">← 请先在左侧点选一张订单</div>
      <div style="margin:8px 0 4px;font-size:12px;font-weight:800;color:#a15c2a;text-align:center;">配餐</div>
      <div class="sideRow">
        <button class="sideBtn" data-side="fries">🍟 薯条</button>
        <button class="sideBtn" data-side="drink">🥤 饮料</button>
      </div>
      <div class="traySide" id="trayside" style="margin-top:8px;"></div>
      <button id="btnServe" disabled>上 菜</button>
      <div class="hint">配齐订单后点击上菜<br>越准越快，小费越多！</div>
    </div>
  </div>

  <!-- START OVERLAY -->
  <div class="overlay" id="startOverlay">
    <div class="card">
      <div class="menuArt">🍗🍔🍟</div>
      <h1>老爹炸鸡汉堡店</h1>
      <p>顾客来点单啦！<b>炸鸡排</b>要炸到<b style="color:#2ecc71">刚刚好</b>，<br>
         按订单<b>从下往上</b>叠好汉堡，配齐薯条饮料，<br>
         趁顾客还有耐心时<b>上菜</b>，赚取小费！</p>
      <p style="font-size:13px;color:#b07a3a;">🎯 顺序 + 火候 + 速度 = 满分好评</p>
      <div id="bestLine" class="hint"></div>
      <button class="btnMain" id="btnStart">开始营业</button>
    </div>
  </div>

  <!-- SUMMARY OVERLAY -->
  <div class="overlay hidden" id="summaryOverlay">
    <div class="card">
      <h2 id="sumTitle">🎉 打烊啦！</h2>
      <div class="stars" id="sumStars">⭐⭐⭐</div>
      <div id="sumRows" style="text-align:left;margin:10px 0;"></div>
      <div class="big">💰 $<span id="sumMoney">0</span></div>
      <div id="sumBest" class="hint"></div>
      <button class="btnMain" id="btnAgain">再营业一天</button>
    </div>
  </div>

</div>

<script>
(function(){
"use strict";

/* ===================== DATA ===================== */
const ING = {
  lettuce:{name:"生菜", em:"🥬", cls:"l-lettuce"},
  tomato :{name:"番茄", em:"🍅", cls:"l-tomato"},
  cheese :{name:"芝士", em:"🧀", cls:"l-cheese"},
  sauce  :{name:"酱料", em:"🥫", cls:"l-sauce"},
};
const TOPPINGS = ["lettuce","tomato","cheese","sauce"];
const CUSTOMER_FACES = ["🧑","👩","👨","👵","👴","🧔","👧","👦","🧑‍🦱","👩‍🦰","🧑‍🎤","👳"];

const COOK_TIME = 4.2;          // seconds to reach "just right" center
const PERFECT_LOW = 0.72;       // fraction of bar where green zone starts
const PERFECT_HIGH = 0.90;      // green zone ends; beyond = burnt
const BURNT_AT = 1.0;
const PATIENCE_BASE = 34;       // seconds of patience per customer

/* ===================== STATE ===================== */
let state = "menu";
let money = 0, day = 1;
let customers = [];             // active tickets
let servedCount = 0, totalToday = 0, spawnedCount = 0;
let activeId = null;            // selected ticket id
let build = { chicks:[], toppings:[], fries:false, drink:false }; // current tray
let baskets = [];               // fryer baskets
let lastTime = 0, spawnTimer = 0, uid = 0;
let dayStats = { served:0, perfect:0, tips:0, lost:0, earned:0 };
let muted = false;

/* ===================== AUDIO ===================== */
let actx = null;
function beep(freq, dur, type, vol){
  if(muted) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type||"sine"; o.frequency.value = freq;
    g.gain.value = vol||0.08;
    o.connect(g); g.connect(actx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + (dur||0.15));
    o.stop(actx.currentTime + (dur||0.15));
  }catch(e){}
}
const sfx = {
  click:()=>beep(520,0.06,"square",0.05),
  add:()=>beep(660,0.08,"sine",0.06),
  drop:()=>beep(300,0.1,"triangle",0.06),
  cook:()=>beep(180,0.25,"sawtooth",0.03),
  ready:()=>{beep(880,0.1,"sine");setTimeout(()=>beep(1180,0.12,"sine"),90);},
  good:()=>{beep(700,0.1,"sine");setTimeout(()=>beep(900,0.1,"sine"),90);setTimeout(()=>beep(1200,0.16,"sine"),180);},
  bad:()=>{beep(200,0.2,"sawtooth",0.08);},
  lost:()=>{beep(160,0.3,"square",0.07);},
};

/* ===================== DOM ===================== */
const $ = id => document.getElementById(id);
const railEl=$("rail"), basketsEl=$("baskets"), plateEl=$("plate"),
      buildBtnsEl=$("buildBtns"), gameEl=$("game");

/* ===================== ORDER GENERATION ===================== */
function makeOrder(){
  uid++;
  const n = 1 + Math.floor(Math.random()*Math.min(3, 1+Math.floor(day/1))); // toppings count
  const shuffled = TOPPINGS.slice().sort(()=>Math.random()-0.5);
  const toppings = shuffled.slice(0, n);
  return {
    id: uid,
    face: CUSTOMER_FACES[Math.floor(Math.random()*CUSTOMER_FACES.length)],
    toppings,                    // order matters (bottom→top as listed)
    fries: Math.random() < 0.55,
    drink: Math.random() < 0.5,
    patience: PATIENCE_BASE,
    patienceMax: PATIENCE_BASE,
    done: false,
  };
}

/* ===================== RENDER: RAIL ===================== */
function renderRail(){
  railEl.innerHTML = "";
  customers.forEach(o=>{
    const t = document.createElement("div");
    t.className = "ticket" + (o.id===activeId?" active":"") + (o.done?" done":"");
    t.onclick = ()=>selectTicket(o.id);
    let lines = `<div class="line">🍔 汉堡</div>`;
    o.toppings.forEach(k=> lines += `<div class="line">＋ ${ING[k].em} ${ING[k].name}</div>`);
    if(o.fries) lines += `<div class="line">🍟 薯条</div>`;
    if(o.drink) lines += `<div class="line">🥤 饮料</div>`;
    t.innerHTML = `
      <div class="cust">${o.face}</div>
      <div class="num">#${o.id}</div>
      <div class="items">${lines}</div>
      <div class="patience"><i style="width:${(o.patience/o.patienceMax*100).toFixed(1)}%;background-position:${(1-o.patience/o.patienceMax)*100}% 0"></i></div>`;
    railEl.appendChild(t);
  });
}
function updatePatienceBars(){
  const tickets = railEl.querySelectorAll(".ticket");
  customers.forEach((o,i)=>{
    const bar = tickets[i] && tickets[i].querySelector(".patience > i");
    if(bar){
      bar.style.width = (o.patience/o.patienceMax*100).toFixed(1)+"%";
      bar.style.backgroundPosition = ((1-o.patience/o.patienceMax)*100)+"% 0";
    }
  });
}

/* ===================== SELECT TICKET ===================== */
function selectTicket(id){
  const o = customers.find(c=>c.id===id);
  if(!o || o.done) return;
  activeId = id;
  sfx.click();
  renderRail();
  renderRecap();
}
function renderRecap(){
  const o = customers.find(c=>c.id===activeId);
  const recap = $("orderRecap");
  if(!o){ recap.textContent = "← 请先在左侧点选一张订单"; return; }
  let s = `正在制作 #${o.id} ${o.face}<br>🍔 `;
  s += o.toppings.map(k=>ING[k].em).join("") || "原味";
  if(o.fries) s += " 🍟";
  if(o.drink) s += " 🥤";
  recap.innerHTML = s;
}

/* ===================== FRY STATION ===================== */
const MAX_BASKETS = 3;
let basketSlots = [];   // persistent DOM slots {root,chick,mbar,zone,fill,tag}

function buildBasketSlots(){
  basketsEl.innerHTML = "";
  basketSlots = [];
  for(let i=0;i<MAX_BASKETS;i++){
    const root = document.createElement("div");
    root.className = "basket empty";
    root.innerHTML = `
      <div class="chick" style="display:none">🍗</div>
      <div class="mbar" style="display:none">
        <div class="zone" style="left:${PERFECT_LOW*100}%;width:${(PERFECT_HIGH-PERFECT_LOW)*100}%"></div>
        <div class="fill" style="width:0%"></div>
      </div>
      <div class="tag"></div>
      <div class="emptyLabel">空篮</div>`;
    root.onclick = ()=>{ if(state==="playing") pullBasket(i); };
    basketsEl.appendChild(root);
    basketSlots.push({
      root,
      chick: root.querySelector(".chick"),
      mbar : root.querySelector(".mbar"),
      fill : root.querySelector(".fill"),
      tag  : root.querySelector(".tag"),
      label: root.querySelector(".emptyLabel"),
    });
  }
}
function renderBaskets(){   // in-place paint; safe to call every frame
  if(basketSlots.length!==MAX_BASKETS) buildBasketSlots();
  for(let i=0;i<MAX_BASKETS;i++){
    const b = baskets[i], s = basketSlots[i];
    if(!b){
      s.root.className = "basket empty";
      s.chick.style.display = "none";
      s.mbar.style.display = "none";
      s.tag.textContent = "";
      s.label.style.display = "";
      continue;
    }
    s.label.style.display = "none";
    s.chick.style.display = "";
    s.mbar.style.display = "";
    const frac = b.t / COOK_TIME;
    let statusCls="", tag="";
    if(frac>=PERFECT_LOW && frac<PERFECT_HIGH){ statusCls="done"; tag="刚刚好!"; }
    else if(frac>=BURNT_AT){ statusCls="burnt"; tag="焦了!"; }
    else if(frac<PERFECT_LOW){ tag="炸制中"; }
    else { statusCls="done"; tag="偏老"; }
    s.root.className = "basket cooking " + statusCls;
    s.chick.textContent = frac>=BURNT_AT ? "🌑" : "🍗";
    s.fill.style.width = Math.min(100,frac*100) + "%";
    s.tag.textContent = tag;
  }
}
function addChick(){
  if(baskets.length>=3){ sfx.bad(); flash($("addChick"),"篮子满了"); return; }
  baskets.push({ t:0, pulled:false });
  sfx.drop();
  renderBaskets();
}
function pullBasket(i){
  const b = baskets[i];
  if(!b) return;
  const frac = b.t / COOK_TIME;
  let quality;
  if(frac < PERFECT_LOW*0.6) quality = "raw";
  else if(frac >= PERFECT_LOW && frac < PERFECT_HIGH) quality = "perfect";
  else if(frac >= BURNT_AT) quality = "burnt";
  else quality = "ok";
  build.chicks.push(quality);
  baskets.splice(i,1);
  if(quality==="perfect"){ sfx.ready(); popText(basketsEl,"完美!","#2ecc71"); }
  else if(quality==="burnt"){ sfx.bad(); popText(basketsEl,"焦了","#e74c3c"); }
  else sfx.add();
  renderBaskets();
  renderPlate();
}

/* ===================== BUILD STATION ===================== */
function renderBuildBtns(){
  buildBtnsEl.innerHTML = "";
  const row1 = document.createElement("div"); row1.className="row";
  TOPPINGS.forEach(k=>{
    const btn = document.createElement("button");
    btn.className="ing";
    btn.innerHTML = `<span class="em">${ING[k].em}</span>${ING[k].name}`;
    btn.onclick = ()=>{ build.toppings.push(k); sfx.add(); renderPlate(); };
    row1.appendChild(btn);
  });
  const row2 = document.createElement("div"); row2.className="row";
  const clr = document.createElement("button");
  clr.className="ing wide"; clr.id="btnClear";
  clr.innerHTML = `<span class="em">🗑️</span>倒掉重做`;
  clr.onclick = clearBuild;
  row2.appendChild(clr);
  buildBtnsEl.appendChild(row1);
  buildBtnsEl.appendChild(row2);
}
function clearBuild(){
  build.chicks=[]; build.toppings=[]; build.fries=false; build.drink=false;
  document.querySelectorAll(".sideBtn").forEach(b=>b.classList.remove("on"));
  sfx.drop(); renderPlate();
}
function renderPlate(){
  plateEl.innerHTML = "";
  // bottom bun
  addLayer("底面包","l-bunBot","🟤");
  // chicks (in order added)
  build.chicks.forEach(q=>{
    let cls="l-chick", txt="炸鸡排";
    if(q==="perfect"){cls+=" l-chickPerfect"; txt="炸鸡排✔";}
    else if(q==="burnt"){cls+=" l-chickBurnt"; txt="焦鸡排";}
    else if(q==="raw"){cls+=" l-chickRaw"; txt="生鸡排";}
    addLayer(txt,cls,"");
  });
  // toppings (in order added)
  build.toppings.forEach(k=> addLayer(ING[k].name, ING[k].cls, ""));
  // top bun (only visually cap if there is something)
  addLayer("顶面包","l-bunTop","");
  renderTraySide();
  updateServeBtn();
}
function addLayer(text, cls, prefix){
  const d = document.createElement("div");
  d.className = "layer "+cls;
  d.textContent = (prefix?prefix+" ":"")+text;
  plateEl.appendChild(d);
}
function renderTraySide(){
  let s = [];
  if(build.fries) s.push("🍟薯条");
  if(build.drink) s.push("🥤饮料");
  $("trayside").textContent = s.join("  ");
}

/* side buttons */
document.querySelectorAll(".sideBtn").forEach(btn=>{
  btn.onclick = ()=>{
    const k = btn.dataset.side;
    build[k] = !build[k];
    btn.classList.toggle("on", build[k]);
    sfx.click(); renderPlate();
  };
});

/* ===================== SERVE / SCORING ===================== */
function updateServeBtn(){
  const o = customers.find(c=>c.id===activeId);
  const hasChick = build.chicks.length>0;
  $("btnServe").disabled = !(o && hasChick);
}
function serve(){
  const o = customers.find(c=>c.id===activeId);
  if(!o || o.done) return;
  if(build.chicks.length===0){ sfx.bad(); return; }

  const res = scoreOrder(o, build);
  o.done = true;
  servedCount++;
  dayStats.served++;
  dayStats.tips += res.tip;
  dayStats.earned += res.total;
  if(res.stars===3) dayStats.perfect++;
  money += res.total;

  if(res.stars>=2) sfx.good(); else sfx.bad();
  popText(gameEl, "+$"+res.total, res.stars>=2?"#2ecc71":"#e67e22", true);
  showCustomerReaction(o, res.stars);

  // remove ticket after brief delay
  setTimeout(()=>{
    customers = customers.filter(c=>c.id!==o.id);
    if(activeId===o.id){ activeId=null; }
    clearBuild();
    renderRail(); renderRecap();
    checkDayEnd();
  }, 500);

  updateHUD();
  renderRail();
}

function scoreOrder(o, b){
  // base pay
  let base = 4;
  let pts = 0, max = 0;

  // ----- chicken cook quality -----
  // customer wants exactly 1 chicken patty
  max += 30;
  const q = b.chicks[0];
  if(b.chicks.length===1){
    if(q==="perfect") pts += 30;
    else if(q==="ok") pts += 20;
    else if(q==="raw") pts += 4;
    else if(q==="burnt") pts += 6;
  }else{
    // wrong number of patties
    pts += (q==="perfect"?15:8);
  }

  // ----- toppings: correctness + order -----
  const want = o.toppings, got = b.toppings;
  max += 40;
  let tp = 0;
  const wantSet = new Set(want), gotSet = new Set(got);
  // correct presence
  let correct = 0, extra = 0, missing = 0;
  want.forEach(k=>{ if(gotSet.has(k)) correct++; else missing++; });
  got.forEach(k=>{ if(!wantSet.has(k)) extra++; });
  const presenceScore = want.length? (correct/want.length) : 1;
  tp += presenceScore * 26;
  tp -= extra * 8;
  // order accuracy (compare sequence of the wanted items only)
  const gotFiltered = got.filter(k=>wantSet.has(k));
  let orderMatch = 0;
  const cmpLen = Math.min(want.length, gotFiltered.length);
  for(let i=0;i<cmpLen;i++) if(want[i]===gotFiltered[i]) orderMatch++;
  const orderScore = want.length? (orderMatch/want.length) : 1;
  tp += orderScore * 14;
  tp = Math.max(0, tp);
  pts += tp;

  // ----- sides -----
  max += 30;
  let sp = 0;
  sp += (b.fries===o.fries)?15:0;
  sp += (b.drink===o.drink)?15:0;
  pts += sp;

  const accuracy = Math.max(0, Math.min(1, pts/max));

  // ----- patience/speed bonus -----
  const patienceFrac = o.patience / o.patienceMax;
  const speedTip = Math.round(patienceFrac * 6);

  // stars
  let stars;
  if(accuracy>=0.9) stars=3; else if(accuracy>=0.65) stars=2; else if(accuracy>=0.4) stars=1; else stars=0;

  const tip = stars>=2 ? speedTip + (stars===3?4:0) : 0;
  const total = Math.max(1, Math.round(base + accuracy*8 + tip));

  return { accuracy, stars, tip, total };
}

function showCustomerReaction(o, stars){
  const idx = customers.indexOf(o);
  const tickets = railEl.querySelectorAll(".ticket");
  const el = tickets[idx];
  const face = stars>=3?"😍":stars===2?"😊":stars===1?"😕":"😠";
  const bubble = document.createElement("div");
  bubble.className="pop";
  bubble.textContent = face + " " + "⭐".repeat(stars);
  bubble.style.color = stars>=2?"#2ecc71":"#e74c3c";
  if(el){
    const r = el.getBoundingClientRect(), gr = gameEl.getBoundingClientRect();
    bubble.style.left = (r.left-gr.left+20)+"px";
    bubble.style.top  = (r.top-gr.top+30)+"px";
  }else{
    bubble.style.left="50%"; bubble.style.top="30%";
  }
  gameEl.appendChild(bubble);
  setTimeout(()=>bubble.remove(),1100);
}

/* ===================== CUSTOMER LOST (patience out) ===================== */
function loseCustomer(o){
  o.done = true;
  dayStats.lost++;
  sfx.lost();
  const idx = customers.indexOf(o);
  const tickets = railEl.querySelectorAll(".ticket");
  const el = tickets[idx];
  if(el){
    const r = el.getBoundingClientRect(), gr = gameEl.getBoundingClientRect();
    const b = document.createElement("div");
    b.className="pop"; b.textContent="😡 走了!"; b.style.color="#e74c3c";
    b.style.left=(r.left-gr.left+10)+"px"; b.style.top=(r.top-gr.top+30)+"px";
    gameEl.appendChild(b); setTimeout(()=>b.remove(),1100);
  }
  setTimeout(()=>{
    customers = customers.filter(c=>c.id!==o.id);
    if(activeId===o.id){ activeId=null; clearBuild(); renderRecap(); }
    renderRail();
    checkDayEnd();
  }, 400);
}

/* ===================== HUD ===================== */
function updateHUD(){
  $("dayLabel").textContent = "第"+day+"天";
  $("custLabel").textContent = servedCount+"/"+totalToday;
  $("moneyLabel").textContent = money;
}

/* ===================== POPUPS / FLASH ===================== */
function popText(anchor, text, color, center){
  const p = document.createElement("div");
  p.className="pop"; p.textContent=text; p.style.color=color||"#333";
  const gr = gameEl.getBoundingClientRect();
  if(center){ p.style.left="50%"; p.style.top="55%"; }
  else{
    const r = anchor.getBoundingClientRect();
    p.style.left = (r.left-gr.left+r.width/2-20)+"px";
    p.style.top  = (r.top-gr.top+10)+"px";
  }
  gameEl.appendChild(p);
  setTimeout(()=>p.remove(),1100);
}
function flash(el, msg){
  popText(el, msg, "#e74c3c");
}

/* ===================== GAME LOOP ===================== */
function loop(ts){
  if(state!=="playing"){ return; }
  if(!lastTime) lastTime = ts;
  let dt = (ts-lastTime)/1000; lastTime = ts;
  if(dt>0.1) dt=0.1;

  // fry cooking
  let cooking=false;
  baskets.forEach(b=>{
    if(b.t < 1.25*COOK_TIME){ b.t += dt; cooking=true; }
  });
  if(cooking && Math.random()<0.04) sfx.cook();
  renderBaskets();

  // patience
  let changed=false;
  customers.forEach(o=>{
    if(o.done) return;
    o.patience -= dt;
    if(o.patience<=0){ o.patience=0; loseCustomer(o); }
    changed=true;
  });
  if(changed) updatePatienceBars();

  // spawn customers
  if(spawnedCount < totalToday && customers.filter(c=>!c.done).length < 4){
    spawnTimer -= dt;
    if(spawnTimer<=0){
      spawnCustomer();
      spawnTimer = 4.5 + Math.random()*3;
    }
  }

  requestAnimationFrame(loop);
}

function spawnCustomer(){
  const o = makeOrder();
  // scale difficulty by day
  o.patienceMax = o.patience = Math.max(20, PATIENCE_BASE - (day-1)*3);
  customers.push(o);
  spawnedCount++;
  sfx.click();
  renderRail();
  if(activeId===null) selectTicket(o.id);
}

/* ===================== DAY FLOW ===================== */
function startDay(){
  state="playing";
  customers=[]; baskets=[]; activeId=null; spawnedCount=0; servedCount=0;
  totalToday = 5 + day;      // grows each day
  dayStats = { served:0, perfect:0, tips:0, lost:0, earned:0 };
  clearBuild();
  spawnTimer = 0.4; lastTime = 0;
  $("startOverlay").classList.add("hidden");
  $("summaryOverlay").classList.add("hidden");
  $("stations").classList.remove("dim");
  updateHUD();
  buildBasketSlots(); renderBaskets(); renderBuildBtns(); renderPlate(); renderRail(); renderRecap();
  requestAnimationFrame(loop);
}

function checkDayEnd(){
  if(state!=="playing") return;
  const active = customers.filter(c=>!c.done).length;
  if(spawnedCount>=totalToday && active===0){
    endDay();
  }
}

function endDay(){
  state="summary";
  const s = dayStats;
  const rate = s.served>0 ? (s.perfect/ (s.served+s.lost)) : 0;
  let stars;
  const goodRatio = (s.served - (s.served - s.perfect)*0.0) ; // placeholder
  const successRatio = (s.served)/(s.served+s.lost || 1);
  if(s.lost===0 && s.perfect>=Math.ceil(s.served*0.6)) stars=3;
  else if(successRatio>=0.7) stars=2;
  else if(successRatio>=0.4) stars=1;
  else stars=0;

  $("sumStars").textContent = "⭐".repeat(stars) + "☆".repeat(3-stars);
  $("sumRows").innerHTML =
    row("✅ 成功出餐", s.served+" 位") +
    row("🌟 完美评价", s.perfect+" 位") +
    row("😡 流失顾客", s.lost+" 位") +
    row("💵 小费总额", "$"+s.tips) +
    row("📈 今日营收", "$"+s.earned);
  $("sumMoney").textContent = money;
  $("sumTitle").textContent = stars===3? "🎉 完美的一天！" : stars===0? "😵 手忙脚乱…" : "🍔 打烊啦！";

  // best score
  const best = Number(localStorage.getItem("laodie_best")||0);
  if(money>best){
    localStorage.setItem("laodie_best", money);
    $("sumBest").textContent = "🏆 新纪录！历史最佳 $"+money;
  }else{
    $("sumBest").textContent = "🏆 历史最佳 $"+best;
  }
  $("stations").classList.add("dim");
  $("summaryOverlay").classList.remove("hidden");
}
function row(a,b){ return `<div class="summaryRow"><span>${a}</span><span>${b}</span></div>`; }

/* ===================== BUTTONS ===================== */
$("addChick").onclick = ()=>{ if(state==="playing") addChick(); };
$("btnServe").onclick = ()=>{ if(state==="playing") serve(); };
$("btnStart").onclick = ()=>{ day=1; money=0; startDay(); };
$("btnAgain").onclick = ()=>{ day++; startDay(); };
$("btnMute").onclick = ()=>{
  muted=!muted;
  $("btnMute").textContent = muted?"🔇":"🔊";
};

/* best score on menu */
(function initMenu(){
  const best = Number(localStorage.getItem("laodie_best")||0);
  if(best>0) $("bestLine").textContent = "🏆 历史最佳收入 $"+best;
})();

})();
</script>
