<script type="module">
import * as THREE from 'three';

// ==================== CONSTANTS ====================
const CITY_BLOCKS = 7;
const BLOCK_SIZE = 45;
const ROAD_WIDTH = 10;
const SIDEWALK_W = 2;
const CELL = BLOCK_SIZE + ROAD_WIDTH + SIDEWALK_W * 2;
const TOTAL_SIZE = CITY_BLOCKS * CELL + ROAD_WIDTH + SIDEWALK_W * 2;
const HALF = TOTAL_SIZE / 2;
const MAX_VEHICLES = 22;
const MAX_NPCS = 35;
const MAX_POLICE = 8;
const MAX_POLICE_CARS = 5;

const CAR_COLORS = [0xe63946,0x1d3557,0xf4a261,0xffffff,0x2a9d8f,0xffd166,0x457b9d,0x264653,0x000000,0xe9c46a,0x6d6875,0xb5838d];
const BUILDING_COLORS = [0xd5bdaf,0xc5c3c6,0xbcb8b1,0xf4f1ea,0xa8a6a1,0xd4c5b9,0x8d99ae,0xe0e1dd,0xb7b7a4,0xddbea9,0xcb997e,0x9caea9];
const CAR_MODELS = [
  { body:[2.0,0.55,4.2], cabin:[1.7,0.35,1.8], cabinZ:-0.2, wheelR:0.32, wheelW:0.14, wx:1.1, wzF:1.4, wzR:-1.4 },
  { body:[2.1,0.6,4.6], cabin:[1.8,0.38,2.0], cabinZ:-0.1, wheelR:0.34, wheelW:0.15, wx:1.15, wzF:1.5, wzR:-1.55 },
  { body:[2.3,0.65,5.0], cabin:[1.9,0.4,2.2], cabinZ:0.0, wheelR:0.36, wheelW:0.16, wx:1.2, wzF:1.65, wzR:-1.7 },
];

// ==================== AUDIO ENGINE ====================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.engineOsc = null;
    this.engineGain = null;
    this.sirenOsc = null;
    this.sirenGain = null;
    this.sirenActive = false;
    this.initialized = false;
  }
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.3;
      this.masterGain.connect(this.ctx.destination);
      this.initialized = true;
    } catch (e) { /* no audio */ }
  }
  startEngine() {
    if (!this.ctx || this.engineOsc) return;
    this.engineOsc = this.ctx.createOscillator();
    this.engineGain = this.ctx.createGain();
    this.engineOsc.type = 'sawtooth';
    this.engineOsc.frequency.value = 55;
    this.engineGain.gain.value = 0;
    this.engineOsc.connect(this.engineGain);
    this.engineGain.connect(this.masterGain);
    this.engineOsc.start();
  }
  updateEngine(rpm) {
    if (!this.engineOsc) return;
    const freq = 40 + rpm * 120;
    this.engineOsc.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.05);
    this.engineGain.gain.setTargetAtTime(0.03 + rpm * 0.08, this.ctx.currentTime, 0.05);
  }
  stopEngine() {
    if (this.engineOsc) { this.engineOsc.stop(); this.engineOsc = null; this.engineGain = null; }
  }
  playGunshot() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.15, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (this.ctx.sampleRate * 0.02));
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.6, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(3000, now);
    filter.frequency.exponentialRampToValueAtTime(200, now + 0.15);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.masterGain);
    src.start(now);
  }
  playPunch() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.08, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (this.ctx.sampleRate * 0.005));
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    src.connect(gain);
    gain.connect(this.masterGain);
    src.start(now);
  }
  startSiren() {
    if (!this.ctx || this.sirenActive) return;
    this.sirenActive = true;
    this.sirenOsc = this.ctx.createOscillator();
    this.sirenGain = this.ctx.createGain();
    this.sirenOsc.type = 'sine';
    this.sirenOsc.frequency.value = 600;
    this.sirenGain.gain.value = 0.06;
    this.sirenOsc.connect(this.sirenGain);
    this.sirenGain.connect(this.masterGain);
    this.sirenOsc.start();
    this._sirenTime = 0;
  }
  updateSiren(dt) {
    if (!this.sirenOsc || !this.sirenActive) return;
    this._sirenTime = (this._sirenTime || 0) + dt;
    const t = this._sirenTime;
    const f = 500 + Math.sin(t * 5) * 200 + (Math.sin(t * 11) > 0 ? 300 : 0);
    this.sirenOsc.frequency.setTargetAtTime(f, this.ctx.currentTime, 0.03);
    this.sirenGain.gain.setTargetAtTime(0.04 + Math.sin(t * 3) * 0.02, this.ctx.currentTime, 0.05);
  }
  stopSiren() {
    if (this.sirenOsc) { this.sirenOsc.stop(); this.sirenOsc = null; this.sirenGain = null; }
    this.sirenActive = false;
  }
}

// ==================== THREE.JS SETUP ====================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8e3);
scene.fog = new THREE.Fog(0x7ec8e3, 100, 400);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 500);
camera.position.set(0, 20, 25);
camera.lookAt(0, 0, 0);

// Lighting
const ambient = new THREE.AmbientLight(0x8899bb, 0.6);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffeedd, 3.5);
sun.position.set(200, 300, 100);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 600;
sun.shadow.camera.left = -200;
sun.shadow.camera.right = 200;
sun.shadow.camera.top = 200;
sun.shadow.camera.bottom = -200;
sun.shadow.bias = -0.0001;
scene.add(sun);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0x444422, 0.5);
scene.add(hemi);

// ==================== HELPERS ====================
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(a, b) { const dx = a.x - b.x, dz = a.z - b.z; return Math.sqrt(dx * dx + dz * dz); }
function dist2D(x1, z1, x2, z2) { const dx = x1 - x2, dz = z1 - z2; return Math.sqrt(dx * dx + dz * dz); }

function getRoadCenter(index) {
  return -HALF + ROAD_WIDTH / 2 + SIDEWALK_W + index * CELL;
}
function getBlockCenter(bx, bz) {
  const roadX0 = getRoadCenter(bx), roadX1 = getRoadCenter(bx + 1);
  const roadZ0 = getRoadCenter(bz), roadZ1 = getRoadCenter(bz + 1);
  return { x: (roadX0 + roadX1) / 2, z: (roadZ0 + roadZ1) / 2 };
}
function isOnRoad(wx, wz) {
  for (let i = 0; i <= CITY_BLOCKS; i++) {
    const rc = getRoadCenter(i);
    if (Math.abs(wx - rc) < ROAD_WIDTH / 2 + SIDEWALK_W) return true;
    if (Math.abs(wz - rc) < ROAD_WIDTH / 2 + SIDEWALK_W) return true;
  }
  return false;
}
function clampToCity(x, z, margin = 5) {
  return {
    x: clamp(x, -HALF + margin, HALF - margin),
    z: clamp(z, -HALF + margin, HALF - margin)
  };
}

// ==================== CITY GENERATION ====================
const buildings = [];
const buildingAABBs = [];

function createGround() {
  // Large road base
  const roadGeo = new THREE.PlaneGeometry(TOTAL_SIZE, TOTAL_SIZE);
  const roadMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3e, roughness: 0.85 });
  const roadPlane = new THREE.Mesh(roadGeo, roadMat);
  roadPlane.rotation.x = -Math.PI / 2;
  roadPlane.receiveShadow = true;
  scene.add(roadPlane);

  // Sidewalk strips
  for (let i = 0; i <= CITY_BLOCKS; i++) {
    const rc = getRoadCenter(i);
    for (const side of [-1, 1]) {
      const swX = rc + side * (ROAD_WIDTH / 2 + SIDEWALK_W / 2);
      const swGeoH = new THREE.PlaneGeometry(TOTAL_SIZE, SIDEWALK_W);
      const swMat = new THREE.MeshStandardMaterial({ color: 0xb0b0b0, roughness: 0.7 });
      const swH = new THREE.Mesh(swGeoH, swMat);
      swH.rotation.x = -Math.PI / 2;
      swH.position.set(0, 0.02, swX);
      swH.receiveShadow = true;
      scene.add(swH);

      const swGeoV = new THREE.PlaneGeometry(SIDEWALK_W, TOTAL_SIZE);
      const swV = new THREE.Mesh(swGeoV, swMat);
      swV.rotation.x = -Math.PI / 2;
      swV.position.set(swX, 0.02, 0);
      swV.receiveShadow = true;
      scene.add(swV);
    }
  }

  // Green blocks
  for (let bx = 0; bx < CITY_BLOCKS; bx++) {
    for (let bz = 0; bz < CITY_BLOCKS; bz++) {
      const bc = getBlockCenter(bx, bz);
      const geo = new THREE.PlaneGeometry(BLOCK_SIZE, BLOCK_SIZE);
      const mat = new THREE.MeshStandardMaterial({ color: 0x5a7d4a, roughness: 0.9 });
      const block = new THREE.Mesh(geo, mat);
      block.rotation.x = -Math.PI / 2;
      block.position.set(bc.x, 0.03, bc.z);
      block.receiveShadow = true;
      scene.add(block);
    }
  }
}

function createBuildings() {
  for (let bx = 0; bx < CITY_BLOCKS; bx++) {
    for (let bz = 0; bz < CITY_BLOCKS; bz++) {
      const bc = getBlockCenter(bx, bz);
      const margin = 1.5;
      const area = { xMin: bc.x - BLOCK_SIZE / 2 + margin, xMax: bc.x + BLOCK_SIZE / 2 - margin,
                     zMin: bc.z - BLOCK_SIZE / 2 + margin, zMax: bc.z + BLOCK_SIZE / 2 - margin };

      // Leave center block empty for player spawn park
      if (bx === 3 && bz === 3) {
        createPark(bc.x, bc.z, BLOCK_SIZE - margin * 2);
        continue;
      }

      const numBuildings = randInt(1, 4);
      const attempts = numBuildings * 6;
      let placed = 0;
      for (let a = 0; a < attempts && placed < numBuildings; a++) {
        const bw = rand(6, 16);
        const bd = rand(6, 16);
        const bx = rand(area.xMin + bw / 2, area.xMax - bw / 2);
        const bz = rand(area.zMin + bd / 2, area.zMax - bd / 2);

        // Check overlap
        let overlap = false;
        for (const b of buildings) {
          const bAABB = buildingAABBs[buildings.indexOf(b)];
          if (Math.abs(bx - b.position.x) < (bw + bAABB.w) / 2 + 1.5 &&
              Math.abs(bz - b.position.z) < (bd + bAABB.d) / 2 + 1.5) {
            overlap = true;
            break;
          }
        }
        if (overlap) continue;

        const h = rand(8, 45);
        const bodyColor = pick(BUILDING_COLORS);
        createBuilding(bx, bz, bw, h, bd, bodyColor);
        placed++;
      }
    }
  }
}

function createBuilding(x, z, w, h, d, color) {
  const group = new THREE.Group();

  // Main body
  const bodyGeo = new THREE.BoxGeometry(w, h, d);
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.05 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = h / 2;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Roof (slightly darker)
  const roofGeo = new THREE.BoxGeometry(w + 0.3, 0.3, d + 0.3);
  const roofColor = new THREE.Color(color).multiplyScalar(0.75);
  const roofMat = new THREE.MeshStandardMaterial({ color: roofColor, roughness: 0.5 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = h + 0.15;
  roof.castShadow = true;
  group.add(roof);

  // Windows (grid of emissive panels on front and back faces)
  if (h > 6 && w > 2 && d > 2) {
    const windowMat = new THREE.MeshStandardMaterial({
      color: 0xaaccff, roughness: 0.2, metalness: 0.3, emissive: 0x112244, emissiveIntensity: 0.3
    });
    const rows = Math.floor(h / 3.5);
    const cols = Math.floor(w / 3);
    const winW = 1.2, winH = 1.8;
    const spacingX = (w - 1.5) / Math.max(cols, 1);
    const spacingY = (h - 2) / Math.max(rows, 1);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const wx = -w / 2 + 1 + c * spacingX;
        const wy = 1.5 + r * spacingY;
        // Front
        const wf = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), windowMat);
        wf.position.set(wx, wy, d / 2 + 0.01);
        wf.name = 'window';
        group.add(wf);
        // Back
        const wb = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), windowMat);
        wb.position.set(wx, wy, -d / 2 - 0.01);
        wb.rotation.y = Math.PI;
        wb.name = 'window';
        group.add(wb);
      }
    }
  }

  // Roof props (AC units)
  if (h > 15 && Math.random() > 0.4) {
    const acGeo = new THREE.BoxGeometry(2, 1.5, 2);
    const acMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.4, metalness: 0.6 });
    for (let i = 0; i < randInt(1, 3); i++) {
      const ac = new THREE.Mesh(acGeo, acMat);
      ac.position.set(rand(-w / 3, w / 3), h + 1, rand(-d / 3, d / 3));
      ac.castShadow = true;
      group.add(ac);
    }
  }

  group.position.set(x, 0, z);
  scene.add(group);

  buildings.push(group);
  buildingAABBs.push({ x, z, w, d, h, xMin: x - w / 2, xMax: x + w / 2, zMin: z - d / 2, zMax: z + d / 2 });
}

function createPark(x, z, size) {
  // Grass
  const geo = new THREE.PlaneGeometry(size, size);
  const mat = new THREE.MeshStandardMaterial({ color: 0x6b9e4a, roughness: 0.9 });
  const park = new THREE.Mesh(geo, mat);
  park.rotation.x = -Math.PI / 2;
  park.position.set(x, 0.04, z);
  park.receiveShadow = true;
  scene.add(park);

  // Trees
  for (let i = 0; i < 12; i++) {
    const tx = x + rand(-size / 2 + 2, size / 2 - 2);
    const tz = z + rand(-size / 2 + 2, size / 2 - 2);
    createTree(tx, tz);
  }
  // Fountain
  const fountainBase = new THREE.Mesh(
    new THREE.CylinderGeometry(3, 3.5, 1, 16),
    new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.3, metalness: 0.5 })
  );
  fountainBase.position.set(x, 0.5, z);
  fountainBase.castShadow = true;
  fountainBase.receiveShadow = true;
  scene.add(fountainBase);

  const fountainWater = new THREE.Mesh(
    new THREE.CylinderGeometry(2.5, 2.5, 0.3, 16),
    new THREE.MeshStandardMaterial({ color: 0x4488cc, roughness: 0.1, metalness: 0.8, emissive: 0x112244, emissiveIntensity: 0.3 })
  );
  fountainWater.position.set(x, 0.95, z);
  scene.add(fountainWater);
}

function createTree(x, z) {
  const group = new THREE.Group();
  const trunkH = rand(2, 4);
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, trunkH, 8),
    new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.8 })
  );
  trunk.position.y = trunkH / 2;
  trunk.castShadow = true;
  group.add(trunk);

  const foliageColor = pick([0x3a7d2c, 0x4a8c3a, 0x2d6a1e, 0x5a9e44]);
  const foliageR = rand(1.5, 3);
  const foliageH = rand(3, 5);
  const foliage = new THREE.Mesh(
    new THREE.ConeGeometry(foliageR, foliageH, 8),
    new THREE.MeshStandardMaterial({ color: foliageColor, roughness: 0.7 })
  );
  foliage.position.y = trunkH + foliageH / 2 - 0.5;
  foliage.castShadow = true;
  group.add(foliage);

  // Sometimes second layer
  if (Math.random() > 0.5) {
    const f2 = new THREE.Mesh(
      new THREE.ConeGeometry(foliageR * 0.7, foliageH * 0.7, 8),
      new THREE.MeshStandardMaterial({ color: foliageColor, roughness: 0.7 })
    );
    f2.position.y = trunkH + foliageH - 0.3;
    f2.castShadow = true;
    group.add(f2);
  }

  group.position.set(x, 0, z);
  scene.add(group);
}

function createStreetLights() {
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.7 });
  const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, roughness: 0.2, emissive: 0xffeedd, emissiveIntensity: 0.5 });

  for (let i = 0; i <= CITY_BLOCKS; i++) {
    const rc = getRoadCenter(i);
    for (let j = 0; j <= CITY_BLOCKS; j++) {
      const rc2 = getRoadCenter(j);
      // Place at block corners
      const places = [
        { x: rc + ROAD_WIDTH / 2 + SIDEWALK_W / 2, z: rc2 + ROAD_WIDTH / 2 + SIDEWALK_W / 2 },
        { x: rc + ROAD_WIDTH / 2 + SIDEWALK_W / 2, z: rc2 - ROAD_WIDTH / 2 - SIDEWALK_W / 2 },
        { x: rc - ROAD_WIDTH / 2 - SIDEWALK_W / 2, z: rc2 + ROAD_WIDTH / 2 + SIDEWALK_W / 2 },
        { x: rc - ROAD_WIDTH / 2 - SIDEWALK_W / 2, z: rc2 - ROAD_WIDTH / 2 - SIDEWALK_W / 2 },
      ];
      for (const p of places) {
        if (Math.abs(p.x) > HALF - 1 || Math.abs(p.z) > HALF - 1) continue;
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 8, 6), poleMat);
        pole.position.set(p.x, 4, p.z);
        pole.castShadow = true;
        scene.add(pole);
        const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 4), lightMat);
        lamp.position.set(p.x, 8.2, p.z);
        scene.add(lamp);
      }
    }
  }
}

function createRoadMarkings() {
  const markMat = new THREE.MeshStandardMaterial({ color: 0xffffffee, roughness: 0.3, emissive: 0x222222, emissiveIntensity: 0.1 });
  for (let i = 0; i < CITY_BLOCKS; i++) {
    const rc1 = getRoadCenter(i);
    const rc2 = getRoadCenter(i + 1);
    const midZ = (rc1 + rc2) / 2;

    // Dashed lines on horizontal roads
    for (let x = -HALF + 10; x < HALF - 10; x += 5) {
      const dashH = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 0.3), markMat);
      dashH.rotation.x = -Math.PI / 2;
      dashH.position.set(x, 0.06, midZ);
      scene.add(dashH);

      const dashV = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2.5), markMat);
      dashV.rotation.x = -Math.PI / 2;
      dashV.position.set(midZ, 0.06, x);
      scene.add(dashV);
    }
  }
}

function createVehicleModel(color) {
  const group = new THREE.Group();
  const model = pick(CAR_MODELS);

  // Body
  const bodyGeo = new THREE.BoxGeometry(model.body[0], model.body[1], model.body[2]);
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.6 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = model.body[1] / 2 + model.wheelR;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Cabin
  const cabinGeo = new THREE.BoxGeometry(model.cabin[0], model.cabin[1], model.cabin[2]);
  const cabinMat = new THREE.MeshStandardMaterial({ color: 0x88bbee, roughness: 0.1, metalness: 0.1, opacity: 0.7, transparent: true });
  const cabin = new THREE.Mesh(cabinGeo, cabinMat);
  cabin.position.y = model.body[1] + model.cabin[1] / 2 + model.wheelR;
  cabin.position.z = model.cabinZ;
  cabin.castShadow = true;
  group.add(cabin);

  // Headlights
  const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, roughness: 0.1, emissive: 0xffffcc, emissiveIntensity: 0.4 });
  for (const sx of [-1, 1]) {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.15, 0.1), hlMat);
    hl.position.set(sx * model.wx * 0.5, model.wheelR + model.body[1] * 0.4, model.wzF + 0.1);
    group.add(hl);
  }
  // Taillights
  const tlMat = new THREE.MeshStandardMaterial({ color: 0xff2222, roughness: 0.1, emissive: 0xff0000, emissiveIntensity: 0.3 });
  for (const sx of [-1, 1]) {
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.15, 0.1), tlMat);
    tl.position.set(sx * model.wx * 0.5, model.wheelR + model.body[1] * 0.4, model.wzR - 0.1);
    group.add(tl);
  }

  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(model.wheelR, model.wheelR, model.wheelW, 12);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
  const wheelPositions = [
    { x: model.wx, z: model.wzF },
    { x: -model.wx, z: model.wzF },
    { x: model.wx, z: model.wzR },
    { x: -model.wx, z: model.wzR },
  ];
  const wheelGroup = new THREE.Group();
  wheelGroup.name = 'wheels';
  for (const wp of wheelPositions) {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(wp.x, model.wheelR, wp.z);
    wheel.name = 'wheel';
    wheelGroup.add(wheel);
  }
  group.add(wheelGroup);

  group.userData = { model, wheelGroup };
  return group;
}

function managePolice(dt) {
  const targetCount = G.wantedLevel * 2 + (G.wantedLevel >= 3 ? G.wantedLevel : 0);
  const carTarget = G.wantedLevel >= 3 ? G.wantedLevel - 1 : 0;
  const currentFoot = G.policeUnits.filter(p => !p.isCar).length;
  const currentCars = G.policeUnits.filter(p => p.isCar).length;

  // Spawn new units
  if (currentFoot < targetCount && G.wantedLevel > 0) {
    const px = G.inVehicle ? G.currentVehicle.x : G.player.x;
    const pz = G.inVehicle ? G.currentVehicle.z : G.player.z;
    const angle = rand(0, Math.PI * 2);
    const spawnDist = rand(40, 70);
    const sx = px + Math.cos(angle) * spawnDist;
    const sz = pz + Math.sin(angle) * spawnDist;
    spawnPoliceUnit(clamp(sx, -HALF + 5, HALF - 5), clamp(sz, -HALF + 5, HALF - 5), false);
  }

  if (currentCars < carTarget && G.wantedLevel >= 3) {
    const px = G.inVehicle ? G.currentVehicle.x : G.player.x;
    const pz = G.inVehicle ? G.currentVehicle.z : G.player.z;
    const angle = rand(0, Math.PI * 2);
    const spawnDist = rand(60, 100);
    const sx = px + Math.cos(angle) * spawnDist;
    const sz = pz + Math.sin(angle) * spawnDist;
    spawnPoliceUnit(clamp(sx, -HALF + 5, HALF - 5), clamp(sz, -HALF + 5, HALF - 5), true);
  }

  // Remove distant police
  const px = G.inVehicle ? G.currentVehicle.x : G.player.x;
  const pz = G.inVehicle ? G.currentVehicle.z : G.player.z;
  for (let i = G.policeUnits.length - 1; i >= 0; i--) {
    const p = G.policeUnits[i];
    if (dist2D(p.x, p.z, px, pz) > 150) {
      scene.remove(p.model);
      G.policeUnits.splice(i, 1);
    }
  }
}

function updatePolice(dt) {
  const px = G.inVehicle ? G.currentVehicle.x : G.player.x;
  const pz = G.inVehicle ? G.currentVehicle.z : G.player.z;

  for (const p of G.policeUnits) {
    const dx = px - p.x, dz = pz - p.z;
    const d = Math.sqrt(dx * dx + dz * dz);
    const targetAngle = Math.atan2(dx, dz);

    if (p.isCar) {
      // Police car chase
      const angleDiff = targetAngle - p.heading;
      const normalizedDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
      p.steerAngle = clamp(normalizedDiff * 2, -0.8, 0.8);

      if (d > 15) {
        p.speed = clamp(p.speed + p.acceleration * dt, 0, p.maxSpeed);
      } else {
        p.speed = clamp(p.speed - p.braking * dt, 0, p.maxSpeed);
      }

      // Update car physics
      p.heading += p.steerAngle * p.speed * 0.03 * dt;
      p.x += Math.sin(p.heading) * p.speed * dt;
      p.z += Math.cos(p.heading) * p.speed * dt;

      // Clamp to city
      const clamped = clampToCity(p.x, p.z);
      p.x = clamped.x; p.z = clamped.z;

      p.model.position.set(p.x, 0, p.z);
      p.model.rotation.y = p.heading;

      // Rotate wheels
      if (p.wheelGroup) {
        p.wheelGroup.children.forEach(w => w.rotation.x += p.speed * dt * 3);
      }

      // Shooting
      p.shootCooldown -= dt;
      if (d < 50 && p.shootCooldown <= 0 && G.wantedLevel >= 3) {
        p.shootCooldown = rand(0.5, 1.5);
        shootBullet(p.x, p.z, p.heading, true);
      }
    } else {
      // Foot police chase
      const angleDiff = targetAngle - p.heading;
      const normalizedDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
      p.heading += clamp(normalizedDiff * 3 * dt, -5 * dt, 5 * dt);

      if (d > 3) {
        p.speed = clamp(p.speed + 8 * dt, 0, 7 + G.wantedLevel);
        p.x += Math.sin(p.heading) * p.speed * dt;
        p.z += Math.cos(p.heading) * p.speed * dt;
      } else {
        p.speed *= 0.9;
      }

      const clamped = clampToCity(p.x, p.z);
      p.x = clamped.x; p.z = clamped.z;
      p.model.position.set(p.x, 0, p.z);
      p.model.rotation.y = p.heading;

      // Shooting
      p.shootCooldown -= dt;
      if (d < 30 && p.shootCooldown <= 0 && G.wantedLevel >= 2) {
        p.shootCooldown = rand(0.8, 2.0);
        shootBullet(p.x, p.z, p.heading, true);
      }
    }
  }
}

// ==================== BULLETS ====================
function shootBullet(x, z, heading, fromPolice = false) {
  const bullet = {
    x, z,
    y: 1.2,
    vx: Math.sin(heading) * 40,
    vz: Math.cos(heading) * 40,
    life: 2.0,
    fromPolice,
  };
  G.bullets.push(bullet);

  // Muzzle flash particle
  spawnParticle(x + Math.sin(heading) * 1.5, 1.5, z + Math.cos(heading) * 1.5, 0xffaa00, 0.3);

  if (!fromPolice) audio.playGunshot();
}

function spawnParticle(x, y, z, color, life) {
  const geo = new THREE.SphereGeometry(rand(0.05, 0.2), 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  scene.add(mesh);
  G.particles.push({
    mesh, life, maxLife: life,
    vy: rand(1, 4),
    vx: rand(-1, 1),
    vz: rand(-1, 1),
  });
}

function updateBullets(dt) {
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    b.x += b.vx * dt;
    b.z += b.vz * dt;
    b.life -= dt;

    if (b.life <= 0 || Math.abs(b.x) > HALF || Math.abs(b.z) > HALF) {
      G.bullets.splice(i, 1);
      continue;
    }

    // Check building collision
    let hitBuilding = false;
    for (const abb of buildingAABBs) {
      if (b.x > abb.xMin && b.x < abb.xMax && b.z > abb.zMin && b.z < abb.zMax) {
        spawnParticle(b.x, b.y, b.z, 0xffcc00, 0.2);
        G.bullets.splice(i, 1);
        hitBuilding = true;
        break;
      }
    }
    if (hitBuilding) continue;

    if (b.fromPolice) {
      // Hit player
      const px = G.inVehicle ? G.currentVehicle.x : G.player.x;
      const pz = G.inVehicle ? G.currentVehicle.z : G.player.z;
      if (dist2D(b.x, b.z, px, pz) < 1.5) {
        damagePlayer(8);
        spawnParticle(b.x, b.y, b.z, 0xff0000, 0.3);
        G.bullets.splice(i, 1);
        continue;
      }
    } else {
      // Hit NPCs
      for (const npc of G.npcs) {
        if (!npc.alive) continue;
        if (dist2D(b.x, b.z, npc.x, npc.z) < 1.2) {
          npc.hp -= 35;
          spawnParticle(b.x, b.y, b.z, 0xff0000, 0.4);
          if (npc.hp <= 0) killNPC(npc);
          else npc.scared = true;
          G.bullets.splice(i, 1);
          addWantedLevel(1);
          break;
        }
      }
      // Hit police
      for (const p of G.policeUnits) {
        if (dist2D(b.x, b.z, p.x, p.z) < (p.isCar ? 2.5 : 1.2)) {
          p.hp -= 30;
          spawnParticle(b.x, b.y, b.z, 0xff6600, 0.4);
          if (p.hp <= 0) {
            scene.remove(p.model);
            G.policeUnits.splice(G.policeUnits.indexOf(p), 1);
          }
          G.bullets.splice(i, 1);
          break;
        }
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      G.particles.splice(i, 1);
      continue;
    }
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.vy -= 5 * dt; // gravity
    p.mesh.material.opacity = p.life / p.maxLife;
    p.mesh.scale.setScalar(p.life / p.maxLife);
  }
}

function killNPC(npc) {
  npc.alive = false;
  npc.model.position.y = -5; // hide underground
  G.money += randInt(5, 40);
  addWantedLevel(1);
  // Respawn after delay
  setTimeout(() => {
    if (npc.alive === false) {
      const rc = getRoadCenter(randInt(0, CITY_BLOCKS));
      const sx = rc + (Math.random() > 0.5 ? 1 : -1) * (ROAD_WIDTH / 2 + SIDEWALK_W / 2);
      const sz = rand(-HALF + 10, HALF - 10);
      const nx = Math.random() > 0.5 ? sx : sz;
      const nz = Math.random() > 0.5 ? sz : sx;
      npc.x = nx; npc.z = nz;
      npc.model.position.set(nx, 0, nz);
      npc.hp = 30;
      npc.alive = true;
      npc.scared = false;
    }
  }, 8000 + Math.random() * 7000);
}

function damagePlayer(amount) {
  if (G.armor > 0) {
    const armorDmg = Math.min(G.armor, amount * 0.6);
    G.armor -= armorDmg;
    G.health -= amount - armorDmg;
  } else {
    G.health -= amount;
  }
  G.screenShake = Math.max(G.screenShake, 0.3);
  if (G.health <= 0) {
    G.health = 100;
    G.armor = 0;
    G.wantedLevel = 0;
    G.wantedTimer = 0;
    G.money = Math.max(0, G.money - 500);
    // Respawn at park
    G.player.set(0, 0, 0);
    if (G.inVehicle) exitVehicle();
    clearPolice();
    showMessage('💀 你死了！-$500');
  }
}

function clearPolice() {
  for (const p of G.policeUnits) scene.remove(p.model);
  G.policeUnits = [];
  audio.stopSiren();
  G.sirenHeard = false;
}

function addWantedLevel(stars) {
  const oldLevel = G.wantedLevel;
  G.wantedLevel = Math.min(5, G.wantedLevel + stars);
  G.wantedTimer = Math.max(G.wantedTimer, 8);
  G.wantedDecay = Math.max(G.wantedDecay, 4);

  if (G.wantedLevel > oldLevel) {
    const starEls = document.querySelectorAll('.star');
    for (let i = oldLevel; i < G.wantedLevel; i++) {
      if (starEls[i]) {
        starEls[i].classList.add('active', 'flash');
        setTimeout(() => starEls[i].classList.remove('flash'), 500);
      }
    }
    if (G.wantedLevel > 0 && !G.sirenHeard) {
      audio.startSiren();
      G.sirenHeard = true;
    }
  }
}

function showMessage(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.classList.add('show');
  G.messageTimer = 2;
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ==================== GAME LOOP ====================
function checkBuildingCollision(x, z, radius = 0.8) {
  for (const abb of buildingAABBs) {
    const closestX = clamp(x, abb.xMin - radius, abb.xMax + radius);
    const closestZ = clamp(z, abb.zMin - radius, abb.zMax + radius);
    if (dist2D(x, z, closestX, closestZ) < radius) {
      return { hit: true, pushX: closestX, pushZ: closestZ };
    }
  }
  return { hit: false };
}

function exitVehicle() {
  if (!G.inVehicle) return;
  const v = G.currentVehicle;
  G.inVehicle = false;
  G.currentVehicle = null;

  // Try multiple exit positions to avoid buildings
  const exitOffsets = [
    { dx: 3, dz: 0 },
    { dx: -3, dz: 0 },
    { dx: 0, dz: 3 },
    { dx: 0, dz: -3 },
    { dx: 2.5, dz: 2.5 },
    { dx: -2.5, dz: -2.5 },
    { dx: 5, dz: 0 },
    { dx: -5, dz: 0 },
  ];
  let placed = false;
  for (const off of exitOffsets) {
    const ex = v.x + Math.sin(v.heading) * off.dx - Math.cos(v.heading) * off.dz;
    const ez = v.z + Math.cos(v.heading) * off.dx + Math.sin(v.heading) * off.dz;
    const col = checkBuildingCollision(ex, ez, 0.6);
    if (!col.hit && Math.abs(ex) < HALF - 1 && Math.abs(ez) < HALF - 1) {
      G.player.set(ex, 0, ez);
      placed = true;
      break;
    }
  }
  if (!placed) {
    G.player.set(v.x + Math.sin(v.heading) * 3, 0, v.z - Math.cos(v.heading) * 3);
  }

  G.playerModel.visible = true;
  G.playerModel.position.copy(G.player);
  G.cameraDistance = 12;
  G.targetCamDist = 12;
  audio.stopEngine();
  showMessage('🚶 已下车');
}

function enterVehicle(vehicle) {
  G.inVehicle = true;
  G.currentVehicle = vehicle;
  G.playerModel.visible = false;
  G.cameraDistance = 18;
  G.targetCamDist = 18;
  vehicle.speed = 0;
  vehicle.steerAngle = 0;
  if (!vehicle.isAI) {
    // Player car
  }
  vehicle.isAI = false;
  audio.startEngine();
  showMessage('🚗 已上车 - WASD驾驶 | E下车 | 空格手刹');
}

function updatePlayerOnFoot(dt) {
  // Movement direction relative to camera
  const forward = new THREE.Vector3(-Math.sin(G.cameraAngle), 0, -Math.cos(G.cameraAngle));
  const right = new THREE.Vector3(Math.cos(G.cameraAngle), 0, -Math.sin(G.cameraAngle));

  let moveX = 0, moveZ = 0;
  if (keys['w'] || keys['arrowup']) { moveX += forward.x; moveZ += forward.z; }
  if (keys['s'] || keys['arrowdown']) { moveX -= forward.x; moveZ -= forward.z; }
  if (keys['a'] || keys['arrowleft']) { moveX -= right.x; moveZ -= right.z; }
  if (keys['d'] || keys['arrowright']) { moveX += right.x; moveZ += right.z; }

  const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
  if (len > 1) { moveX /= len; moveZ /= len; }

  const isMoving = len > 0.1;
  const sprinting = keys['shift'] && isMoving;
  const speed = sprinting ? 12 : 6;

  if (isMoving) {
    G.player.x += moveX * speed * dt;
    G.player.z += moveZ * speed * dt;
    // Face movement direction
    G.playerModel.rotation.y = Math.atan2(moveX, moveZ);
  }

  // Jump (single press)
  if (keys[' '] && G.playerGrounded) {
    G.playerYVel = 8;
    G.playerGrounded = false;
    keys[' '] = false; // consume jump press
  }

  // Gravity
  if (!G.playerGrounded) {
    G.playerYVel -= 20 * dt;
    G.player.y += G.playerYVel * dt;
    if (G.player.y <= 0) {
      G.player.y = 0;
      G.playerYVel = 0;
      G.playerGrounded = true;
    }
  }

  // Clamp to city
  const clamped = clampToCity(G.player.x, G.player.z);
  G.player.x = clamped.x; G.player.z = clamped.z;

  // Building collision
  const col = checkBuildingCollision(G.player.x, G.player.z, 0.6);
  if (col.hit) {
    const dx = G.player.x - col.pushX;
    const dz = G.player.z - col.pushZ;
    const d = Math.sqrt(dx * dx + dz * dz) || 1;
    G.player.x = col.pushX + (dx / d) * 0.6;
    G.player.z = col.pushZ + (dz / d) * 0.6;
  }

  G.playerModel.position.copy(G.player);
  G.playerModel.position.y = G.player.y;

  // Walking animation (bob)
  if (isMoving) {
    const bobSpeed = sprinting ? 18 : 10;
    G.playerModel.position.y += Math.abs(Math.sin(G.time * bobSpeed)) * 0.08;
  }

  // Vehicle proximity check & enter prompt
  let nearVehicle = null, nearDist = 4;
  for (const v of G.vehicles) {
    const d = dist2D(G.player.x, G.player.z, v.x, v.z);
    if (d < nearDist) { nearVehicle = v; nearDist = d; }
  }
  if (nearVehicle && !G._nearMsgShown) {
    showMessage('🚗 按 E 上车');
    G._nearMsgShown = true;
  } else if (!nearVehicle) {
    G._nearMsgShown = false;
  }

  // Enter vehicle
  if (keys['e'] && nearVehicle) {
    keys['e'] = false;
    enterVehicle(nearVehicle);
  } else if (keys['e']) {
    keys['e'] = false; // consume even if no vehicle nearby
  }

  // Attack
  G.attackCooldown -= dt;
  if (G.mouseDown && G.attackCooldown <= 0) {
    G.attackCooldown = 0.3;
    if (G.weapon === 'fist') {
      audio.playPunch();
      // Check nearby NPCs
      for (const npc of G.npcs) {
        if (!npc.alive) continue;
        if (dist2D(G.player.x, G.player.z, npc.x, npc.z) < 2.5) {
          npc.hp -= 20;
          npc.scared = true;
          spawnParticle(npc.x, 1.5, npc.z, 0xff4444, 0.3);
          if (npc.hp <= 0) killNPC(npc);
          addWantedLevel(1);
          break;
        }
      }
    } else if (G.weapon === 'pistol' && G.ammo.pistol > 0) {
      G.ammo.pistol--;
      shootBullet(G.player.x, G.player.z, G.playerModel.rotation.y, false);
      G.screenShake = 0.08;
      if (G.ammo.pistol <= 0) {
        G.weapon = 'fist';
        showMessage('⚠️ 弹药耗尽！切换至拳头');
      }
    } else if (G.weapon === 'pistol' && G.ammo.pistol <= 0) {
      G.weapon = 'fist';
      showMessage('⚠️ 弹药耗尽！切换至拳头');
    }
  }
}

function updatePlayerInVehicle(dt) {
  const v = G.currentVehicle;
  if (!v) return;

  // Vehicle controls
  const throttle = (keys['w'] || keys['arrowup']) ? 1 : 0;
  const brake = (keys['s'] || keys['arrowdown']) ? 1 : 0;
  const steerInput = (keys['a'] || keys['arrowleft']) ? 1 : ((keys['d'] || keys['arrowright']) ? -1 : 0);
  const handbrake = keys[' '] ? 1 : 0;

  // Physics
  const absSpeed = Math.abs(v.speed);
  const speedFactor = clamp(1 - absSpeed / v.maxSpeed, 0.1, 1);

  if (throttle) v.speed += v.acceleration * speedFactor * dt;
  else if (brake) v.speed -= v.braking * dt * (v.speed > 0 ? 1.5 : 1);
  else v.speed *= (1 - 1.5 * dt); // natural deceleration

  if (handbrake && absSpeed > 3) {
    v.speed *= (1 - 4 * dt);
    v.steerAngle = clamp(v.steerAngle + steerInput * 2.5 * dt, -1.2, 1.2);
  } else {
    const steerSpeed = 3.5 / (1 + absSpeed * 0.1);
    const targetSteer = steerInput * clamp(1 - absSpeed / v.maxSpeed, 0.2, 1);
    v.steerAngle = lerp(v.steerAngle, targetSteer, steerSpeed * dt);
  }

  // Reverse
  if (brake && absSpeed < 0.5 && !throttle) {
    v.speed -= v.acceleration * 0.5 * dt;
    v.speed = Math.max(v.speed, -8);
  }

  // Clamp speed
  v.speed = clamp(v.speed, -15, v.maxSpeed);

  // Update position
  v.heading += v.steerAngle * v.speed * 0.025 * dt;
  v.x += Math.sin(v.heading) * v.speed * dt;
  v.z += Math.cos(v.heading) * v.speed * dt;

  // Clamp to city
  const clamped = clampToCity(v.x, v.z, 3);
  v.x = clamped.x; v.z = clamped.z;

  // Building collision
  const col = checkBuildingCollision(v.x, v.z, 2.5);
  if (col.hit) {
    const dx = v.x - col.pushX, dz = v.z - col.pushZ;
    const d = Math.sqrt(dx * dx + dz * dz) || 1;
    v.x = col.pushX + (dx / d) * 2.5;
    v.z = col.pushZ + (dz / d) * 2.5;
    v.speed *= 0.3;
    G.screenShake = Math.max(G.screenShake, 0.15);
  }

  // Vehicle-vehicle collision
  for (const other of G.vehicles) {
    if (other === v) continue;
    const d = dist2D(v.x, v.z, other.x, other.z);
    if (d < 3.5) {
      const dx = v.x - other.x, dz = v.z - other.z;
      const pushDist = (3.5 - d) / 2;
      const nd = Math.sqrt(dx * dx + dz * dz) || 1;
      v.x += (dx / nd) * pushDist;
      v.z += (dz / nd) * pushDist;
      other.x -= (dx / nd) * pushDist;
      other.z -= (dz / nd) * pushDist;
      v.speed *= 0.7;
      other.speed *= 0.7;
    }
  }

  // Hit NPCs
  for (const npc of G.npcs) {
    if (!npc.alive) continue;
    if (dist2D(v.x, v.z, npc.x, npc.z) < 2 && absSpeed > 5) {
      killNPC(npc);
      addWantedLevel(1);
    }
  }

  v.model.position.set(v.x, 0, v.z);
  v.model.rotation.y = v.heading;

  // Rotate wheels
  if (v.wheelGroup) {
    v.wheelGroup.children.forEach(w => w.rotation.x += v.speed * dt * 3);
  }

  // Engine audio
  audio.updateEngine(Math.abs(v.speed) / v.maxSpeed);

  // Exit
  if (keys['e']) {
    keys['e'] = false;
    exitVehicle();
  }

  // Shoot from vehicle
  G.attackCooldown -= dt;
  if (G.mouseDown && G.attackCooldown <= 0 && G.weapon === 'pistol' && G.ammo.pistol > 0) {
    G.attackCooldown = 0.25;
    G.ammo.pistol--;
    shootBullet(v.x, v.z, v.heading, false);
    G.screenShake = 0.05;
    if (G.ammo.pistol <= 0) {
      G.weapon = 'fist';
      showMessage('⚠️ 弹药耗尽！切换至拳头');
    }
  }
}

function updateAI(dt) {
  const px = G.inVehicle ? G.currentVehicle.x : G.player.x;
  const pz = G.inVehicle ? G.currentVehicle.z : G.player.z;

  // AI Vehicles
  for (const v of G.vehicles) {
    if (!v.isAI) continue;

    // Too far from player? Respawn
    if (dist2D(v.x, v.z, px, pz) > 130) {
      const roadIdx = randInt(0, CITY_BLOCKS);
      const rc = getRoadCenter(roadIdx);
      const along = rand(-HALF + 10, HALF - 10);
      if (Math.random() > 0.5) { v.x = rc; v.z = along; v.heading = Math.random() > 0.5 ? 0 : Math.PI; }
      else { v.x = along; v.z = rc; v.heading = Math.random() > 0.5 ? Math.PI / 2 : -Math.PI / 2; }
      v.speed = rand(5, 15);
      v.steerAngle = 0;
    }

    // Simple AI: follow road
    v.aiTurnTimer -= dt;
    if (v.aiTurnTimer <= 0) {
      v.aiTurnTimer = rand(2, 6);
      // Maybe turn at intersection
      if (Math.random() < 0.25) {
        v.heading += (Math.random() > 0.5 ? Math.PI / 2 : -Math.PI / 2);
      }
    }

    v.x += Math.sin(v.heading) * v.speed * dt;
    v.z += Math.cos(v.heading) * v.speed * dt;

    // Bounce off city edges
    if (Math.abs(v.x) > HALF - 5) { v.heading = -v.heading; v.x = clamp(v.x, -HALF + 5, HALF - 5); }
    if (Math.abs(v.z) > HALF - 5) { v.heading = Math.PI - v.heading; v.z = clamp(v.z, -HALF + 5, HALF - 5); }

    // Building avoidance
    const col = checkBuildingCollision(v.x, v.z, 2.5);
    if (col.hit) {
      v.heading += (Math.random() - 0.5) * 1.5;
      v.x += Math.sin(v.heading) * v.speed * dt * 2;
      v.z += Math.cos(v.heading) * v.speed * dt * 2;
    }

    // Vehicle-vehicle avoidance
    for (const other of G.vehicles) {
      if (other === v) continue;
      const d = dist2D(v.x, v.z, other.x, other.z);
      if (d < 5 && d > 0) {
        const dx = v.x - other.x, dz = v.z - other.z;
        v.x += (dx / d) * 2 * dt;
        v.z += (dz / d) * 2 * dt;
      }
    }

    const clamped = clampToCity(v.x, v.z, 3);
    v.x = clamped.x; v.z = clamped.z;

    v.model.position.set(v.x, 0, v.z);
    v.model.rotation.y = v.heading;
    if (v.wheelGroup) v.wheelGroup.children.forEach(w => w.rotation.x += v.speed * dt * 3);
  }

  // NPCs
  for (const npc of G.npcs) {
    if (!npc.alive) continue;

    if (npc.scared) {
      // Run away from player
      npc.fleeTimer -= dt;
      const dx = npc.x - px, dz = npc.z - pz;
      const d = Math.sqrt(dx * dx + dz * dz) || 1;
      npc.targetX = npc.x + (dx / d) * 10;
      npc.targetZ = npc.z + (dz / d) * 10;
      npc.speed = 6;
      if (npc.fleeTimer <= 0) { npc.scared = false; npc.speed = rand(0.8, 2.5); }
    } else {
      npc.waitTimer -= dt;
      if (npc.waitTimer <= 0) {
        npc.waitTimer = rand(2, 6);
        npc.targetX = npc.x + rand(-5, 5);
        npc.targetZ = npc.z + rand(-5, 5);
        // Keep on sidewalks
        const clampedT = clampToCity(npc.targetX, npc.targetZ, 3);
        npc.targetX = clampedT.x; npc.targetZ = clampedT.z;
      }
    }

    // Move toward target
    const tdx = npc.targetX - npc.x, tdz = npc.targetZ - npc.z;
    const td = Math.sqrt(tdx * tdx + tdz * tdz);
    if (td > 0.3) {
      npc.heading = Math.atan2(tdx, tdz);
      npc.x += Math.sin(npc.heading) * npc.speed * dt;
      npc.z += Math.cos(npc.heading) * npc.speed * dt;
    }

    // Avoid buildings
    const col = checkBuildingCollision(npc.x, npc.z, 0.5);
    if (col.hit) {
      npc.heading += Math.PI / 2;
      npc.x += Math.sin(npc.heading) * 2 * dt;
      npc.z += Math.cos(npc.heading) * 2 * dt;
      npc.targetX = npc.x; npc.targetZ = npc.z;
    }

    const clamped = clampToCity(npc.x, npc.z);
    npc.x = clamped.x; npc.z = clamped.z;
    npc.model.position.set(npc.x, 0, npc.z);
    npc.model.rotation.y = npc.heading;

    // Too far from player? Random reposition
    if (dist2D(npc.x, npc.z, px, pz) > 130) {
      const roadIdx = randInt(0, CITY_BLOCKS);
      const rc = getRoadCenter(roadIdx);
      const sx = rc + (Math.random() > 0.5 ? 1 : -1) * (ROAD_WIDTH / 2 + SIDEWALK_W / 2);
      const sz = rand(-HALF + 10, HALF - 10);
      npc.x = Math.random() > 0.5 ? sx : sz;
      npc.z = Math.random() > 0.5 ? sz : sx;
    }
  }
}

function updateWanted(dt) {
  if (G.wantedLevel > 0) {
    G.wantedTimer -= dt;
    if (G.wantedTimer <= 0) {
      G.wantedDecay -= dt;
      if (G.wantedDecay <= 0) {
        G.wantedLevel = Math.max(0, G.wantedLevel - 1);
        G.wantedDecay = 3;
        if (G.wantedLevel === 0) {
          clearPolice();
          audio.stopSiren();
          G.sirenHeard = false;
          showMessage('⭐ 已逃脱追捕');
        } else {
          showMessage('⭐ 通缉降低至 ' + G.wantedLevel + ' 星');
        }
      }
    }
  }
}

function updateCamera(dt) {
  const target = G.inVehicle ? G.currentVehicle : G.player;
  const tx = G.inVehicle ? target.x : target.x;
  const ty = G.inVehicle ? 0 : target.y;
  const tz = G.inVehicle ? target.z : target.z;

  const camTargetX = tx - Math.sin(G.cameraAngle) * G.targetCamDist * Math.cos(G.cameraPitch);
  const camTargetY = ty + G.targetCamDist * Math.sin(G.cameraPitch);
  const camTargetZ = tz - Math.cos(G.cameraAngle) * G.targetCamDist * Math.cos(G.cameraPitch);

  G.cameraDistance = lerp(G.cameraDistance, G.targetCamDist, 4 * dt);

  const cx = tx - Math.sin(G.cameraAngle) * G.cameraDistance * Math.cos(G.cameraPitch);
  const cy = ty + G.cameraDistance * Math.sin(G.cameraPitch);
  const cz = tz - Math.cos(G.cameraAngle) * G.cameraDistance * Math.cos(G.cameraPitch);

  // Check building occlusion — raycast from target to camera
  const camDir = new THREE.Vector3(cx - tx, cy - ty, cz - tz).normalize();
  const camDist = Math.sqrt((cx - tx) ** 2 + (cy - ty) ** 2 + (cz - tz) ** 2);
  let minDist = camDist;
  for (const abb of buildingAABBs) {
    // Simple ray-AABB intersection
    const tmin = (abb.xMin - tx) / (camDir.x || 0.001);
    const tmax = (abb.xMax - tx) / (camDir.x || 0.001);
    // Skip complex ray test, just check if camera is inside building
    if (cx > abb.xMin && cx < abb.xMax && cz > abb.zMin && cz < abb.zMax && cy < abb.h) {
      minDist = Math.min(minDist, dist2D(tx, tz, abb.xMin, abb.zMin));
    }
  }

  G.cameraPos.lerp(new THREE.Vector3(cx, cy, cz), 6 * dt);
  G.cameraLook.lerp(new THREE.Vector3(tx, ty + 1.5, tz), 8 * dt);

  // Screen shake
  if (G.screenShake > 0) {
    G.cameraPos.x += (Math.random() - 0.5) * G.screenShake * 2;
    G.cameraPos.y += (Math.random() - 0.5) * G.screenShake * 2;
    G.screenShake *= Math.exp(-8 * dt);
  }

  camera.position.copy(G.cameraPos);
  camera.lookAt(G.cameraLook);
}

function updateHUD() {
  // Health
  const healthPct = Math.max(0, G.health);
  document.getElementById('health-fill').style.width = healthPct + '%';
  if (healthPct < 30) {
    document.getElementById('health-fill').style.background = 'linear-gradient(0deg, #cc2222, #ff4444)';
  } else {
    document.getElementById('health-fill').style.background = 'linear-gradient(0deg, #2ecc40, #4eff5e)';
  }

  // Armor
  document.getElementById('armor-fill').style.width = Math.max(0, G.armor) + '%';

  // Money
  document.getElementById('money').textContent = G.money.toLocaleString();

  // Weapon
  const weaponDisplay = document.getElementById('weapon-name');
  const ammoDisplay = document.getElementById('ammo');
  if (G.weapon === 'fist') {
    weaponDisplay.textContent = '👊 拳头';
    ammoDisplay.textContent = '';
  } else if (G.weapon === 'pistol') {
    weaponDisplay.textContent = '🔫 手枪';
    ammoDisplay.textContent = '弹药: ' + G.ammo.pistol;
  }

  // Speed
  const speedEl = document.getElementById('speed-display');
  if (G.inVehicle) {
    const kmh = Math.round(Math.abs(G.currentVehicle.speed) * 3.6);
    speedEl.innerHTML = kmh + '<span style="font-size:14px;color:#aaa"> km/h</span>';
    speedEl.classList.add('show');
  } else {
    speedEl.classList.remove('show');
  }

  // Wanted stars
  const stars = document.querySelectorAll('.star');
  stars.forEach((s, i) => s.classList.toggle('active', i < G.wantedLevel));

  // Message
  if (G.messageTimer > 0) {
    G.messageTimer -= 1/60;
    if (G.messageTimer <= 0) {
      document.getElementById('message').classList.remove('show');
    }
  }
}

function updateMinimap() {
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  const size = 180;
  const half = size / 2;
  const scale = size / (TOTAL_SIZE * 1.1);

  ctx.clearRect(0, 0, size, size);

  // Clip to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(half, half, half - 2, 0, Math.PI * 2);
  ctx.clip();

  // Background
  ctx.fillStyle = '#3a3a3e';
  ctx.fillRect(0, 0, size, size);

  // Green blocks
  ctx.fillStyle = '#4a6d3a';
  for (let bx = 0; bx < CITY_BLOCKS; bx++) {
    for (let bz = 0; bz < CITY_BLOCKS; bz++) {
      const bc = getBlockCenter(bx, bz);
      const sx = half + bc.x * scale;
      const sy = half + bc.z * scale;
      const bw = BLOCK_SIZE * scale;
      ctx.fillRect(sx - bw / 2, sy - bw / 2, bw, bw);
    }
  }

  // NPCs
  ctx.fillStyle = '#888';
  for (const npc of G.npcs) {
    if (!npc.alive) continue;
    const sx = half + npc.x * scale;
    const sy = half + npc.z * scale;
    ctx.fillRect(sx - 1, sy - 1, 2, 2);
  }

  // AI vehicles
  for (const v of G.vehicles) {
    if (v === G.currentVehicle) continue;
    const sx = half + v.x * scale;
    const sy = half + v.z * scale;
    ctx.fillStyle = v.isAI ? '#aaa' : '#ffaa00';
    ctx.fillRect(sx - 1.5, sy - 1.5, 3, 3);
  }

  // Police
  for (const p of G.policeUnits) {
    const sx = half + p.x * scale;
    const sy = half + p.z * scale;
    ctx.fillStyle = '#3388ff';
    ctx.beginPath();
    ctx.arc(sx, sy, p.isCar ? 2.5 : 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Player
  const px = G.inVehicle ? G.currentVehicle.x : G.player.x;
  const pz = G.inVehicle ? G.currentVehicle.z : G.player.z;
  const psx = half + px * scale;
  const psy = half + pz * scale;

  // Player direction triangle
  const pHeading = G.inVehicle ? G.currentVehicle.heading : G.playerModel.rotation.y;
  ctx.fillStyle = '#44ff44';
  ctx.beginPath();
  const tipX = psx + Math.sin(pHeading) * 5;
  const tipY = psy + Math.cos(pHeading) * 5;
  const lx = psx + Math.sin(pHeading + 2.5) * 4;
  const ly = psy + Math.cos(pHeading + 2.5) * 4;
  const rx = psx + Math.sin(pHeading - 2.5) * 4;
  const ry = psy + Math.cos(pHeading - 2.5) * 4;
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(lx, ly);
  ctx.lineTo(rx, ry);
  ctx.closePath();
  ctx.fill();

  // Player dot
  ctx.fillStyle = '#00ff00';
  ctx.beginPath();
  ctx.arc(psx, psy, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Border
  ctx.restore();
  ctx.beginPath();
  ctx.arc(half, half, half - 2, 0, Math.PI * 2);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  ctx.stroke();

  // North indicator
  ctx.fillStyle = '#fff';
  ctx.font = '10px Arial';
  ctx.fillText('N', half - 4, 14);
}

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  const dt = Math.min(0.1, (timestamp - (G._lastTime || timestamp)) / 1000);
  G._lastTime = timestamp;
  G.time += dt;

  // FPS counter
  G.fpsCounter++;
  G.fpsTime += dt;
  if (G.fpsTime >= 1) {
    G.fps = Math.round(G.fpsCounter / G.fpsTime);
    G.fpsCounter = 0;
    G.fpsTime = 0;
    document.getElementById('fps').textContent = G.fps + ' FPS';
  }

  // Update
  if (G.inVehicle) {
    updatePlayerInVehicle(dt);
  } else {
    updatePlayerOnFoot(dt);
  }

  updateAI(dt);
  updatePolice(dt);
  managePolice(dt);
  updateBullets(dt);
  updateParticles(dt);
  updateWanted(dt);
  updateCamera(dt);
  audio.updateSiren(dt);

  // Weapon switch
  if (keys['tab']) {
    keys['tab'] = false;
    G.weapon = G.weapon === 'fist' ? 'pistol' : 'fist';
    showMessage(G.weapon === 'pistol' ? '🔫 切换至手枪' : '👊 切换至拳头');
  }

  // Render
  renderer.render(scene, camera);

  // HUD (every 4 frames)
  if (Math.floor(G.time * 60) % 4 === 0) {
    updateHUD();
    updateMinimap();
  }
}
